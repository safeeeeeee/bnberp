<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B&B ERP Pro</title>
    <script type="module">

    window.__firebaseModules = { initializeApp, getApps, getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, onSnapshot, query, where, orderBy, getAuth, signInAnonymously, onAuthStateChanged };

    <script>
    // Create a promise that resolves when Firebase modules are loaded
    window.__firebaseReadyPromise = new Promise(resolve => {
        if (window.__firebaseReady) { resolve(); return; }
        window.__firebaseReadyResolve = resolve;
    });

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-950: #000000;
            --navy-900: #000000;
            --navy-850: #0a0a0a;
            --navy-800: #111111;
            --navy-750: #161616;
            --navy-700: #1a1a1a;
            --navy-600: #262626;
            --navy-500: #404040;
            --navy-400: #737373;
            --navy-300: #d4d4d4;
            --navy-200: #e5e5e5;
            --navy-100: #f5f5f5;
            --accent:   #ffffff;
            --accent-glow: rgba(255,255,255,0.08);
            --gold:     #f59e0b;
            --gold-dim: rgba(245,158,11,0.12);
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;
            --border: rgba(255,255,255,0.08);
            --border-bright: rgba(255,255,255,0.16);
            --success: #10b981;
            --success-bg: rgba(16,185,129,0.1);
            --danger: #ef4444;
            --danger-bg: rgba(239,68,68,0.1);
            --warning: #f59e0b;
            --warning-bg: rgba(245,158,11,0.1);
            --purple: #8b5cf6;
            --purple-bg: rgba(139,92,246,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--navy-900); color: var(--text-primary); font-size: 14px; line-height: 1.6; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--navy-850); }
        ::-webkit-scrollbar-thumb { background: var(--navy-600); border-radius: 3px; }

        #loading { position: fixed; top: 16px; right: 20px; background: var(--navy-700); border: 1px solid var(--border-bright); color: var(--navy-300); padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; letter-spacing: 0.3px; z-index: 9999; display: none; align-items: center; gap: 6px; }
        .spinner { width: 10px; height: 10px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .header-avatar-btn { cursor: pointer; border: none; background: none; padding: 0; line-height: 0; border-radius: 50%; }
        .header-avatar-btn:hover { opacity: 0.85; }

        /* PROFILE UPLOAD */
        .profile-upload { margin-top: 4px; }
        .profile-preview { margin: 12px 0 14px; }
        .profile-preview .avatar, .profile-preview .avatar-fallback { width: 72px; height: 72px; font-size: 22px; }
        .profile-upload-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-box { background: var(--navy-850); border: 1px solid var(--border-bright); border-radius: 14px; padding: 28px 32px; width: 90%; max-width: 620px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.6); }
        .modal-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 18px; }
        .modal-close { float: right; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; line-height: 1; }
        .modal-close:hover { color: var(--danger); }

        /* AUTH */
        .auth-bg { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy-950); background-image: radial-gradient(ellipse at 30% 50%, rgba(255,255,255,0.03) 0%, transparent 60%), radial-gradient(ellipse at 70% 20%, rgba(255,255,255,0.04) 0%, transparent 50%); }
        .auth-card { background: var(--navy-850); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; width: 380px; box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 24px 48px rgba(0,0,0,0.8); }
        .auth-logo { text-align: center; margin-bottom: 28px; }
        .auth-logo .brand-icon { width: 52px; height: 52px; background: linear-gradient(135deg, var(--navy-600), var(--navy-700)); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 12px; border: 1px solid var(--border-bright); }
        .auth-logo h1 { font-size: 20px; font-weight: 600; color: var(--text-primary); }
        .auth-logo p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; letter-spacing: 0.5px; }
        .auth-hint { background: var(--navy-800); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-top: 14px; font-size: 12px; color: var(--text-secondary); }
        .auth-hint strong { color: var(--navy-300); }

        /* INPUTS */
        input, select, textarea { width: 100%; padding: 10px 14px; margin-top: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--navy-800); color: var(--text-primary); font-family: inherit; font-size: 14px; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        input::placeholder { color: var(--text-muted); }
        select option { background: var(--navy-800); }
        textarea { resize: vertical; min-height: 80px; }
        label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-top: 14px; letter-spacing: 0.3px; text-transform: uppercase; }

        /* BUTTONS */
        .btn-primary { background: var(--accent); color: #000; padding: 10px 20px; border-radius: 8px; border: none; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; width: 100%; margin-top: 20px; }
        .btn-primary:hover { background: #e5e5e5; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-sm { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--navy-700); color: var(--text-primary); font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .btn-sm:hover { background: var(--navy-600); border-color: var(--border-bright); }
        .btn-sm.success { background: var(--success-bg); color: var(--success); border-color: rgba(16,185,129,0.3); }
        .btn-sm.success:hover { background: rgba(16,185,129,0.2); }
        .btn-sm.danger { background: var(--danger-bg); color: var(--danger); border-color: rgba(239,68,68,0.3); }
        .btn-sm.warning { background: var(--warning-bg); color: var(--warning); border-color: rgba(245,158,11,0.3); }
        .btn-sm.purple { background: var(--purple-bg); color: var(--purple); border-color: rgba(139,92,246,0.3); }
        .btn-outline { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .btn-outline:hover { border-color: var(--border-bright); color: var(--text-primary); }

        /* HEADER */
        .header { height: 60px; background: var(--navy-850); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .brand-pill { background: var(--navy-700); border: 1px solid var(--border-bright); border-radius: 8px; padding: 4px 10px; font-size: 13px; font-weight: 700; color: var(--navy-300); letter-spacing: 0.5px; }
        .header-brand span { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .sync-dot { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--success); font-weight: 500; }
        .sync-dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .header-user { display: flex; align-items: center; gap: 14px; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .user-name { font-size: 14px; font-weight: 500; }
        .user-role { font-size: 11px; color: var(--text-secondary); }
        .btn-logout { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; font-family: inherit; padding: 6px 10px; border-radius: 6px; transition: all 0.2s; }
        .btn-logout:hover { color: var(--danger); background: var(--danger-bg); }

        /* SIDEBAR */
        .layout { display: flex; }
        .sidebar { width: 240px; background: var(--navy-850); border-right: 1px solid var(--border); padding: 20px 14px; min-height: calc(100vh - 60px); flex-shrink: 0; position: relative; }
        .sidebar-section { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; padding: 0 8px; margin: 18px 0 8px; }
        .sidebar-section:first-child { margin-top: 4px; }
        .nav-btn { width: 100%; padding: 9px 12px; border-radius: 8px; border: none; background: none; text-align: left; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text-secondary); display: flex; align-items: center; gap: 10px; transition: all 0.15s; margin-bottom: 2px; }
        .nav-btn:hover { background: var(--navy-750); color: var(--text-primary); }
        .nav-btn.active { background: var(--accent-glow); color: var(--text-primary); border-left: 2px solid var(--accent); padding-left: 10px; }
        .nav-icon { font-size: 15px; width: 18px; text-align: center; }
        .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

        /* MAIN */
        .main { flex: 1; padding: 28px 32px; overflow-x: hidden; }

        /* CARDS */
        .card { background: var(--navy-850); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .card-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .card-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        /* STATS */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: var(--navy-800); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
        .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-val { font-size: 26px; font-weight: 700; color: var(--text-primary); margin-top: 4px; }
        .stat-val.accent { color: var(--accent); }
        .stat-val.gold { color: var(--gold); }
        .stat-val.green { color: var(--success); }
        .stat-val.purple { color: var(--purple); }
        .stat-val.red { color: var(--danger); }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; }
        thead tr { border-bottom: 1px solid var(--border); }
        th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
        tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.15s; }
        tbody tr:hover { background: var(--navy-800); }
        tbody tr:last-child { border-bottom: none; }
        td { padding: 14px; font-size: 13px; }
        .td-title { font-weight: 600; color: var(--text-primary); }
        .td-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

        /* BADGES */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
        .badge-high { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }
        .badge-medium { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(245,158,11,0.25); }
        .badge-low { background: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.25); }
        .badge-role { background: var(--accent-glow); color: var(--text-primary); border: 1px solid var(--border-bright); }
        .badge-consultant { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }
        .badge-pending { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(245,158,11,0.25); }
        .badge-inprogress { background: var(--accent-glow); color: var(--text-primary); border: 1px solid var(--border-bright); }
        .badge-completed { background: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
        .badge-canceled { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }
        .badge-paid { background: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
        .badge-partial { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(245,158,11,0.25); }
        .badge-unpaid { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }

        /* LEADERBOARD */
        .leader-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: 8px; margin-bottom: 6px; transition: background 0.15s; }
        .leader-row:hover { background: var(--navy-800); }
        .leader-rank { font-size: 13px; font-weight: 700; color: var(--text-muted); min-width: 24px; }
        .leader-rank.gold { color: var(--gold); }
        .leader-rank.silver { color: #a3a3a3; }
        .leader-rank.bronze { color: #b45309; }
        .leader-info { display: flex; align-items: center; gap: 10px; flex: 1; margin-left: 12px; }
        .leader-name { font-size: 13px; font-weight: 500; }
        .leader-score { font-size: 14px; font-weight: 700; color: var(--success); min-width: 70px; text-align: right; }
        .score-bar-wrap { flex: 1; height: 4px; background: var(--navy-700); border-radius: 2px; margin: 0 14px; overflow: hidden; }
        .score-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.6s ease; }

        /* FORM GRID */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
        .form-full { grid-column: 1 / -1; }

        /* EMPTY STATE */
        .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
        .empty-text { font-size: 14px; }

        /* AVATAR */
        .avatar-fallback { width: 36px; height: 36px; border-radius: 50%; background: var(--navy-600); border: 2px solid var(--accent); display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--navy-200); }
        .avatar-sm { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--border-bright); }
        .avatar-sm-fallback { width: 32px; height: 32px; border-radius: 50%; background: var(--navy-700); border: 1.5px solid var(--border-bright); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--navy-200); flex-shrink: 0; }

        /* ACCOUNTING TABS */
        .sub-tabs { display: flex; gap: 6px; margin-bottom: 22px; border-bottom: 1px solid var(--border); padding-bottom: 0; flex-wrap: wrap; }
        .sub-tab { padding: 8px 16px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-secondary); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: -1px; transition: all 0.2s; }
        .sub-tab:hover { color: var(--text-primary); }
        .sub-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ACCOUNT TYPE COLORS */
        .acc-assets { color: #d4d4d4; }
        .acc-liabilities { color: #f87171; }
        .acc-equity { color: #a78bfa; }
        .acc-revenues { color: #34d399; }
        .acc-expenses { color: #fbbf24; }
        .acc-section-header { background: var(--navy-800); border-radius: 6px; padding: 8px 14px; margin: 12px 0 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }

        /* STATUS SELECT */
        .status-select { padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--navy-800); color: var(--text-primary); font-family: inherit; font-size: 12px; cursor: pointer; margin-top: 0; width: auto; }

        /* TOAST */
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy-700); border: 1px solid var(--border-bright); color: var(--text-primary); padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 9999; animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .amount-green { color: var(--success); font-weight: 600; }
        .amount-red { color: var(--danger); font-weight: 600; }
        .amount-gold { color: var(--gold); font-weight: 600; }

        /* TASK DETAIL PANEL */
        .task-detail { background: var(--navy-800); border: 1px solid var(--border-bright); border-radius: 10px; padding: 20px; margin-top: 8px; }
        .task-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
        .task-detail-item { background: var(--navy-850); border-radius: 8px; padding: 10px 14px; }
        .task-detail-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .task-detail-val { font-size: 13px; color: var(--text-primary); font-weight: 500; margin-top: 3px; }

        /* AR LINK BADGE */
        .ar-link { display: inline-flex; align-items: center; gap: 4px; background: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.3); border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 600; }

        /* CLICKABLE ROW */
        .clickable-row { cursor: pointer; }
        .clickable-row:hover td { background: rgba(255,255,255,0.04); }

        /* REASSIGN BTN */
        .btn-action-group { display: flex; gap: 5px; flex-wrap: wrap; }

        /* WORKLOAD WIDGET */
        .workload-widget { background: var(--navy-800); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }

        /* TABS SWITCH */
        .tab-switch { display: flex; background: var(--navy-800); border-radius: 8px; padding: 3px; gap: 2px; margin-bottom: 20px; }
        .tab-switch-btn { flex: 1; padding: 7px 12px; border: none; background: none; color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
        .tab-switch-btn.active { background: var(--navy-700); color: var(--text-primary); border: 1px solid var(--border); }

        /* ── GLOBAL ANIMATIONS ── */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scaleIn  { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        @keyframes shimmer  { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes countUp  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .anim-fade-up  { animation: fadeInUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .anim-fade     { animation: fadeIn 0.25s ease both; }
        .anim-scale    { animation: scaleIn 0.3s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .anim-slide-right { animation: slideInRight 0.3s cubic-bezier(0.22, 1, 0.36, 1) both; }

        /* Stagger delays for children */
        .stagger > *:nth-child(1)  { animation-delay: 0ms; }
        .stagger > *:nth-child(2)  { animation-delay: 60ms; }
        .stagger > *:nth-child(3)  { animation-delay: 120ms; }
        .stagger > *:nth-child(4)  { animation-delay: 180ms; }
        .stagger > *:nth-child(5)  { animation-delay: 240ms; }
        .stagger > *:nth-child(6)  { animation-delay: 300ms; }
        .stagger > *:nth-child(7)  { animation-delay: 360ms; }

        /* Sidebar nav animation */
        .nav-btn { transition: all 0.18s cubic-bezier(0.22, 1, 0.36, 1) !important; }
        .nav-btn:hover { transform: translateX(3px); }
        .nav-btn.active { transform: translateX(2px); }

        /* Card hover lift */
        .card { transition: box-shadow 0.2s ease, border-color 0.2s ease; }
        .card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.25); }

        /* Button press feedback */
        .btn-sm, .btn-primary, .btn-outline { transition: all 0.15s cubic-bezier(0.22, 1, 0.36, 1) !important; }
        .btn-sm:active { transform: scale(0.95) !important; }
        .btn-primary:active { transform: scale(0.97) !important; }

        /* Table row animation */

    if (cls==='avatar') return `<span class="avatar-fallback">${initials(name)}</span>`;
    return `<span class="avatar-sm-fallback">${initials(name)}</span>`;
}
function isProfilePicSrc(src) {
    if (!src) return false;
    const s = String(src).trim();
    return s.startsWith('http') || s.startsWith('data:image/');
}
const MAX_PROFILE_PIC_BYTES = 800 * 1024;
function readProfilePicFile(file) {
    return new Promise((resolve, reject) => {
        if (!file) { resolve(''); return; }
        const okTypes = ['image/png', 'image/jpeg', 'image/jpg'];
        if (!okTypes.includes(file.type)) {
            reject(new Error('Only PNG or JPG files are allowed'));
            return;
        }
        if (file.size > MAX_PROFILE_PIC_BYTES) {
            reject(new Error('Image must be smaller than 800KB'));
            return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Failed to read image file'));
        reader.readAsDataURL(file);
    });
}
async function onProfilePicFileChange(prefix) {
    const input = document.getElementById(`${prefix}_file`);
    const file = input && input.files && input.files[0];
    if (!file) return;
    try {
        const dataUrl = await readProfilePicFile(file);
        document.getElementById(`${prefix}_data`).value = dataUrl;
        const urlInput = document.getElementById(`${prefix}_url`);
        if (urlInput) urlInput.value = '';
        const preview = document.getElementById(`${prefix}_preview`);
        if (preview) preview.innerHTML = `<img src="${escapeAttr(dataUrl)}" class="avatar" alt="">`;
    } catch (err) {
        showToast(err.message || 'Invalid image file', 'error');
        input.value = '';
    }
}
function resolveProfilePicFromForm(prefix, fallback='') {

    if (url && (url.startsWith('http') || url.startsWith('data:image/'))) return url;
    return fallback;
}

    const user = getUserById(userId) || (isSelf ? STATE.user : null);

    if (!isSelf && !requireAdmin('edit user profiles')) return;
    const pic = resolveProfilePicFromForm('prof', user.pic || '');
    const newPw = document.getElementById('prof_new_pw')?.value || '';
    const confirmPw = document.getElementById('prof_confirm_pw')?.value || '';
    const curPw = document.getElementById('prof_cur_pw')?.value || '';
    const patch = {};
    if (pic !== (user.pic || '')) patch.pic = pic;
    if (newPw || confirmPw) {
        if (newPw.length < 4) { showToast('Password must be at least 4 characters', 'error'); return; }
        if (newPw !== confirmPw) { showToast('Passwords do not match', 'error'); return; }
        if (isSelf && !isAdminUser() && String(user.pw) !== String(curPw)) {
            showToast('Current password is incorrect', 'error');
            return;

        patch.pw = newPw;
    }
    if (!Object.keys(patch).length) { showToast('No changes to save', 'info'); return; }

        await patchRow(user.id, patch);
        applyUserSessionUpdate({ ...user, ...patch });

        ['ar',                  dedupeById(STATE.accountsReceivable)],
        ['ap',                  dedupeById(STATE.accountsPayable)],

        ['expense_types',       STATE.expenseTypes],

async function apiRequest(url, options = {}) {
    // Default data pull is routed to Firestore so the app stays cloud-synced.
    // RTDB: mainDb.ref(FIREBASE_ROWS_PATH).once('value')
    // Firestore: getDocs(collection(mainDb, FIREBASE_ROWS_PATH))
    // Data mapping: RTDB JSON tree 'erp_rows/{id}' → Firestore collection 'erp_rows' / document {id}
    if (mainDb && url === API_URL && !options.method) {
        await ensureFirebaseAuth();
        const snap = await _getDocs(_col(mainDb, FIREBASE_ROWS_PATH));
        const rows = [];
        snap.forEach(docSnap => rows.push({ ...docSnap.data(), _firestoreId: docSnap.id }));
        return rows;
    }

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);
    try {
        const fetchOptions = { ...options, signal: controller.signal };
        const res = await fetch(url, fetchOptions);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        return text ? JSON.parse(text) : {};
    } finally {
        clearTimeout(timeout);
    }
}

async function gasPost(payload) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);
    try {
        const payloadText = JSON.stringify(payload);
        const attempts = [
            {
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: payloadText
            },
            {
                headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
                body: new URLSearchParams({ payload: payloadText }).toString()
            }
        ];

        let lastError;
        for (const attempt of attempts) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: attempt.headers,
                    body: attempt.body,
                    signal: controller.signal
                });
                const text = await res.text();
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${text}`);
                return text ? JSON.parse(text) : {};
            } catch (err) {
                lastError = err;
            }
        }

        throw lastError || new Error('POST request failed');
    } catch(e) {
        console.error('[GAS POST] Error:', e, payload);
        throw e;
    } finally {
        clearTimeout(timeout);
    }
}

async function postRow(row) {
    await ensureFirebaseReady();
    if (mainDb) {
        await ensureFirebaseAuth();
        const id = row?.id != null ? String(row.id) : String(Date.now());
        const payload = { ...row, id: row?.id != null ? row.id : Number(id) };
        // RTDB: mainDb.ref(`erp_rows/${id}`).set(payload)
        // Firestore: setDoc(doc(collection, id), payload)
        // Collection 'erp_rows' maps from RTDB node 'erp_rows'; document ID = row id
        await _setDoc(_doc(mainDb, FIREBASE_ROWS_PATH, id), payload);
        return { ok: true, id: payload.id };
    }
    return await gasPost({ action: 'insert', data: row });
}

async function patchRow(id, patch) {
    await ensureFirebaseReady();
    if (mainDb) {
        await ensureFirebaseAuth();
        const targetId = String(id ?? patch?.id ?? '');
        if (!targetId) throw new Error('Missing row id for Firestore update');
        // RTDB: mainDb.ref(`erp_rows/${targetId}`).update(patch)
        // Firestore: updateDoc(doc(mainDb, 'erp_rows', targetId), patch)
        await _updateDoc(_doc(mainDb, FIREBASE_ROWS_PATH, targetId), patch || {});
        return { ok: true, id: targetId };
    }
    return await gasPost({ action: 'update', id: id, data: patch });
}

async function deleteRow(id) {
    await ensureFirebaseReady();
    if (mainDb) {
        await ensureFirebaseAuth();
        const targetId = String(id ?? '');
        if (!targetId) throw new Error('Missing row id for Firestore delete');
        // RTDB: mainDb.ref(`erp_rows/${targetId}`).remove()
        // Firestore: deleteDoc(doc(mainDb, 'erp_rows', targetId))
        await _deleteDoc(_doc(mainDb, FIREBASE_ROWS_PATH, targetId));
        return { ok: true, id: targetId };
    }
    return await gasPost({ action: 'delete', id: id });

async function syncData(silent=false) {

    try {
        const newData = await apiRequest(API_URL);
        if (STATE.user && STATE.view==='dash') {

        }
        STATE.allData = newData;

        const newTasksHash = taskHash(newData);
        const tasksChanged = newTasksHash !== LAST_TASKS_HASH;
        LAST_TASKS_HASH = newTasksHash;
        if (!silent) {
            render();
        } else if (STATE.view === 'dash' && STATE.tab === 'tasks' && tasksChanged && !isTaskFormDirty()) {
            // Auto-refresh only tasks tab and only when task data changed.
            render();
        }
    } catch(e) {
        console.error("Sync Error:", e);
        // Keep UI usable even when DB is unavailable.
        if (!silent && (STATE.view === 'login' || STATE.user)) render();
    }
    if (el) el.style.display='none';
}

        // Always fetch fresh data before checking credentials

        STATE.allData = freshData;

        const candidates = [...FALLBACK_USERS, ...freshData];
        const user = candidates.find(u => u.un && String(u.un).trim().toLowerCase() === un.toLowerCase() && String(u.pw) === pw);
        if (user) {
            STATE.user = user;
            STATE.view = 'dash';
            localStorage.setItem('erp_user', JSON.stringify(user));
            render();
        } else {
            btn.textContent = 'Invalid username or password';
            btn.style.background = 'var(--danger)';
            btn.disabled = false;
            setTimeout(() => { btn.textContent = 'Sign In'; btn.style.background = ''; }, 2500);
        }
    } catch(e) {
        const fallbackUser = FALLBACK_USERS.find(u => u.un.toLowerCase() === un.toLowerCase() && u.pw === pw);
        if (fallbackUser) {
            STATE.user = fallbackUser;
            STATE.view = 'dash';
            localStorage.setItem('erp_user', JSON.stringify(fallbackUser));
            showToast('Logged in with fallback profile (database offline).', 'info');
            render();
            return;
        }
        btn.textContent = 'Connection error — retry';
        btn.style.background = 'var(--warning)';
        btn.disabled = false;
        setTimeout(() => { btn.textContent = 'Sign In'; btn.style.background = ''; }, 2500);
    }
}

    // This also means the subsequent syncData/hydrateAccountingFromAllData
    // will read the already-patched allData and not wipe the new entry.
    if (newArEntry) {
        STATE.accountsReceivable.push(newArEntry);
        // Post double-entry: Dr Accounts Receivable / Cr Service Revenue
        glPostARInvoice(newArEntry);
        saveAccounting();
    }

    try {
        // Fire task write and accounting write in parallel for speed
        await Promise.all([
            postRow(data),
            newArEntry ? rewriteAccountingRowsInDb() : Promise.resolve()
        ]);

        // Clear form immediately so the UI feels responsive
        titleEl.value = '';
        descEl.value = '';
        arAmountEl.value = '';
        if (addArEl) addArEl.checked = false;
        showToast('Task created successfully!');

        // syncData refreshes the task list; _patchSyncRowsIntoAllData() already
        // updated allData's accounting sync rows so hydration won't overwrite AR.
        await syncData(true);
    } catch (e) {
        console.error('Create task error:', e);
        showToast('Task save failed. Check DB connection.', 'error');
    }
}

// ── DELETE TASK (from Case Pipeline) ──
async function deleteTask(taskId) {
    if (!requireAdmin('delete tasks')) return;
    const task = STATE.allData.find(t => String(t.id)===String(taskId));
    if (!task) return;
    const linkedAR = STATE.accountsReceivable.find(r => String(r.linkedTaskId)===String(taskId));
    const warn = linkedAR
        ? `Delete case "${task.title||'—'}"?\n\nThis also removes its linked receivable (${fmt(linkedAR.total)}) and the related ledger entries. This cannot be undone.`
        : `Delete case "${task.title||'—'}"? This cannot be undone.`;
    if (!confirm(warn)) return;

    // Clean up the linked receivable + its GL entries so Chart of Accounts,
    // General Ledger and Trial Balance stay consistent.
    let accountingTouched = false;
    if (linkedAR) {
        const arIdStr = String(linkedAR.id);
        STATE.generalLedger = STATE.generalLedger.filter(e => {
            const ref = String(e.reference || '');
            return !ref.endsWith('-' + arIdStr) && !ref.startsWith('PMT-' + arIdStr + '-');
        });
        STATE.accountsReceivable = STATE.accountsReceivable.filter(r => String(r.id)!==arIdStr);
        syncCOABalancesFromGL();
        accountingTouched = true;
    }
    // Optimistically remove from the local cache + persist, then re-render so the
    // user gets instant feedback regardless of network latency.
    STATE.allData = STATE.allData.filter(t => String(t.id)!==String(taskId));
    if (accountingTouched) saveAccounting();
    closeModal();
    render();

    try {
        // Use the Firestore document id when we have it (falls back to the row id).
        await deleteRow(task._firestoreId || task.id || taskId);
        if (accountingTouched) await rewriteAccountingRowsInDb();
        showToast('Case deleted!');
    } catch(e) {
        console.error('Delete task error:', e);
        showToast('Removed locally, but cloud delete failed. It may reappear on next sync.', 'error');
    }
}

// Migrate plain string arrays to enriched account objects
function migrateCOA() {
    let changed = false;
    if (!STATE.chartOfAccounts || typeof STATE.chartOfAccounts !== 'object') {
        STATE.chartOfAccounts = defaultChartOfAccounts();
        changed = true;
    }
    for (const [key, meta] of Object.entries(COA_META)) {
        if (!Array.isArray(STATE.chartOfAccounts[key])) {
            STATE.chartOfAccounts[key] = [];
            changed = true;
        }
        STATE.chartOfAccounts[key] = STATE.chartOfAccounts[key].map((acc, i) => {
            if (typeof acc === 'string') {
                changed = true;
                return { id: Date.now() + Math.random(), code: meta.codeStart + (i * 10), name: acc, balance: 0, description: '', active: true, createdAt: new Date().toISOString() };
            }
            if (!acc || typeof acc !== 'object') {
                changed = true;
                return { id: Date.now() + Math.random(), code: meta.codeStart + (i * 10), name: 'Unnamed Account', balance: 0, description: '', active: true, createdAt: new Date().toISOString() };
            }
            if (!acc.id) { acc.id = Date.now() + Math.random(); changed = true; }
            if (!acc.name && acc.title) { acc.name = acc.title; changed = true; }
            if (!acc.name) { acc.name = 'Unnamed Account'; changed = true; }
            if (!acc.code) { acc.code = meta.codeStart + (i * 10); changed = true; }
            if (acc.balance === undefined) { acc.balance = parseFloat(acc.value ?? acc.amount ?? 0) || 0; changed = true; }
            if (acc.description === undefined) { acc.description = ''; changed = true; }
            if (acc.active === undefined) { acc.active = true; changed = true; }
            if (!acc.createdAt) { acc.createdAt = new Date().toISOString(); changed = true; }
            return acc;
        });
        STATE.chartOfAccounts[key].sort((a,b)=>(parseInt(a.code)||0)-(parseInt(b.code)||0));
    }
    if (changed) {
        saveAccounting();
    }
}

function getNextCOACode(type) {
    if (!COA_META[type]) return 1000;
    const accs = STATE.chartOfAccounts[type] || [];
    const meta = COA_META[type];
    if (!accs.length) return meta.codeStart;
    const max = Math.max(...accs.map(a => parseInt(a.code)||0));
    return max + 10;
}

        (coa[key] || []).forEach(acc => {
            allAccounts.push({ ...acc, _type: key, _meta: meta });
        });
    }

    // Filter
    let filtered = allAccounts;
    if (filter !== 'all') filtered = filtered.filter(a => a._type === filter);
    if (search) filtered = filtered.filter(a =>
        (a.name||'').toLowerCase().includes(search) ||
        String(a.code||'').includes(search) ||
        String(a.balance||'').includes(search) ||
        (a.description||'').toLowerCase().includes(search)

    if (STATE.coaActiveOnly) filtered = filtered.filter(a => a.active !== false);

    if (sortMode === 'code') filtered.sort((a,b) => (parseInt(a.code)||0)-(parseInt(b.code)||0));
    else if (sortMode === 'name') filtered.sort((a,b) => (a.name||'').localeCompare(b.name||''));
    else if (sortMode === 'type') filtered.sort((a,b) => a._type.localeCompare(b._type));
    else if (sortMode === 'value') filtered.sort((a,b) => (parseFloat(b.balance)||0)-(parseFloat(a.balance)||0));

            </div>
        </div>
    </div>`;
    updateCOACodeSuggestion();
    setTimeout(() => document.getElementById('coa_name')?.focus(), 100);
}

function updateCOACodeSuggestion() {
    const type = document.getElementById('coa_type')?.value;
    if (!type) return;
    const meta = COA_META[type];
    const codeEl = document.getElementById('coa_code');
    if (codeEl && !codeEl._userEdited) codeEl.value = getNextCOACode(type);
    const infoEl = document.getElementById('coa_normal_info');
    if (infoEl && meta) {
        const isDebit = meta.normal === 'Debit';
        infoEl.innerHTML = `<span class="${isDebit?'coa-normal-debit':'coa-normal-credit'}" style="font-size:13px; font-weight:700;">${meta.normal} Balance</span> <span style="color:var(--text-muted); margin-left:6px;">${isDebit ? 'Increases with debits, decreases with credits' : 'Increases with credits, decreases with debits'}</span>`;
    }
}

async function saveNewCOAAccount() {
    if (!requireAdmin('add accounts')) return;
    const type = document.getElementById('coa_type').value;
    migrateCOA();
    const code = parseInt(document.getElementById('coa_code').value)||getNextCOACode(type);
    const name = document.getElementById('coa_name').value.trim();
    const balance = parseFloat(document.getElementById('coa_balance').value)||0;
    const desc = document.getElementById('coa_desc').value.trim();
    const active = document.getElementById('coa_active').checked;
    if (!name) { showToast('Account name is required', 'error'); return; }
    const dup = (STATE.chartOfAccounts[type]||[]).find(a => String(a.code)===String(code));
    if (dup) { showToast(`Code ${code} already exists in this category`, 'error'); return; }
    STATE.chartOfAccounts[type].push({ id: Date.now() + Math.random(), code, name, balance, description: desc, active, createdAt: new Date().toISOString() });
    STATE.chartOfAccounts[type].sort((a,b)=>(parseInt(a.code)||0)-(parseInt(b.code)||0));
    const synced = await persistAccountingNow('Account added!');
    closeModal();
    render();
    if (synced) await syncData(true);
}

async function saveEditCOAAccount(type, id) {
    if (!requireAdmin('edit accounts')) return;
    migrateCOA();
    const acc = (STATE.chartOfAccounts[type]||[]).find(a => String(a.id)===String(id));
    if (!acc) return;
    const code = parseInt(document.getElementById('edit_coa_code').value)||acc.code;
    const name = document.getElementById('edit_coa_name').value.trim();
    const balance = parseFloat(document.getElementById('edit_coa_balance').value)||0;
    const desc = document.getElementById('edit_coa_desc').value.trim();
    const active = document.getElementById('edit_coa_active').checked;
    if (!name) { showToast('Account name is required', 'error'); return; }
    const dup = (STATE.chartOfAccounts[type]||[]).find(a => String(a.id)!==String(id) && String(a.code)===String(code));
    if (dup) { showToast(`Code ${code} already exists in this category`, 'error'); return; }
    acc.code = code; acc.name = name; acc.balance = balance; acc.description = desc; acc.active = active;
    STATE.chartOfAccounts[type].sort((a,b)=>(parseInt(a.code)||0)-(parseInt(b.code)||0));
    const synced = await persistAccountingNow('Account updated!');
    closeModal();
    render();
    if (synced) await syncData(true);
}

async function removeAccount(type, id) {
    if (!requireAdmin('delete accounts')) return;
    migrateCOA();
    const acc = (STATE.chartOfAccounts[type]||[]).find(a => String(a.id)===String(id));
    if (!acc) return;
    if (!confirm(`Delete "${acc.name}"? This cannot be undone.`)) return;
    STATE.chartOfAccounts[type] = STATE.chartOfAccounts[type].filter(a => String(a.id)!==String(id));
    // Persist to localStorage FIRST (saveAccounting runs synchronously inside
    // persistAccountingNow before any network call) so the deletion survives a
    // refresh even if the cloud write fails. Then sync the full set to the cloud.
    const synced = await persistAccountingNow('Account deleted!');
    render();
    if (synced) await syncData(true);
}

async function toggleCOAActive(type, id) {
    if (!requireAdmin('edit accounts')) return;
    migrateCOA();
    const acc = (STATE.chartOfAccounts[type]||[]).find(a => String(a.id)===String(id));
    if (!acc) return;
    acc.active = acc.active === false ? true : false;
    const synced = await persistAccountingNow(acc.active ? 'Account activated!' : 'Account deactivated!');
    render();
    if (synced) await syncData(true);
}

function exportCOA() {
    migrateCOA();
    const rows = [['Code','Account Name','Category','Normal Balance','Value','Description','Status']];
    for (const [key, meta] of Object.entries(COA_META)) {
        (STATE.chartOfAccounts[key]||[]).forEach(acc => {
            rows.push([acc.code||'', acc.name||'', meta.label, meta.normal, acc.balance||0, acc.description||'', acc.active!==false?'Active':'Inactive']);
        });
    }
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'chart_of_accounts.csv'; a.click();
    showToast('COA exported as CSV!');
}

function printCOA() {
    migrateCOA();
    const sections = Object.entries(COA_META).map(([key, meta]) => {
        const accs = (STATE.chartOfAccounts[key]||[]).filter(a=>a.active!==false);
        if (!accs.length) return '';
        return `<div style="margin-bottom:20px;"><h3 style="border-bottom:1px solid #ccc;padding-bottom:4px;">${meta.icon} ${meta.label}</h3>
        <table border="1" cellpadding="6" cellspacing="0" style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr style="background:#f0f0f0;"><th>Code</th><th>Account Name</th><th>Normal Balance</th><th>Value</th><th>Description</th></tr></thead>
        <tbody>${accs.map(a=>`<tr><td>${a.code||''}</td><td>${a.name}</td><td>${meta.normal}</td><td>${fmt(a.balance||0)}</td><td>${a.description||''}</td></tr>`).join('')}
        </tbody></table></div>`;
    }).join('');
    const w = window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>Chart of Accounts — B&B ERP</title></head><body>
    <h2>📒 Chart of Accounts — B&amp;B ERP Pro</h2>
    <div style="font-size:12px;color:#666;margin-bottom:16px;">Printed: ${new Date().toLocaleString('en-PK')}</div>
    ${sections}
    </body></html>`);
    w.document.close(); w.print();
}

function openCOAImport() {
    if (!requireAdmin('import accounts')) return;
    document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal-box" style="max-width:500px;">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-title">⬆ Import Accounts from CSV</div>
            <div style="background:var(--navy-800); border-radius:8px; padding:12px 14px; margin-bottom:16px; font-size:12px; color:var(--text-secondary); line-height:1.8;">
                <strong style="color:var(--text-primary);">Expected CSV format:</strong><br>
                <code style="font-size:11px; color:var(--gold);">Code, Account Name, Category, Value, Description</code><br>
                Category must be one of: <strong>assets, liabilities, equity, revenues, expenses</strong><br>
                First row (header) is automatically skipped.
            </div>
            <label>CSV File</label>
            <input type="file" id="coa_import_file" accept=".csv" style="margin-top:8px;">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-primary" style="margin-top:0;" onclick="processCOAImport()">Import</button>
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>`;
}

async function processCOAImport() {
    if (!requireAdmin('import accounts')) return;
    const file = document.getElementById('coa_import_file')?.files?.[0];
    if (!file) { showToast('Please select a CSV file', 'error'); return; }
    const text = await file.text();
    const lines = text.split('\n').slice(1).filter(l=>l.trim());
    let imported = 0, skipped = 0;
    migrateCOA();
    for (const line of lines) {
        const parts = line.split(',').map(c => c.replace(/^"|"$/g,'').trim());
        const [code, name, cat, valueOrDesc, ...rest] = parts;
        const type = (cat||'').toLowerCase();
        if (!name || !COA_META[type]) { skipped++; continue; }
        const hasValueColumn = rest.length > 0;
        const balance = hasValueColumn ? (parseFloat(valueOrDesc)||0) : 0;
        const desc = hasValueColumn ? rest.join(',').trim() : (valueOrDesc||'');
        STATE.chartOfAccounts[type].push({ id: Date.now()+Math.random(), code: parseInt(code)||getNextCOACode(type), name, balance, description: desc||'', active: true, createdAt: new Date().toISOString() });
        STATE.chartOfAccounts[type].sort((a,b)=>(parseInt(a.code)||0)-(parseInt(b.code)||0));
        imported++;
    }
    const synced = await persistAccountingNow(`Imported ${imported} accounts!${skipped?' ('+skipped+' skipped)':''}`);
    closeModal(); render();
    if (synced) await syncData(true);
}

function resetCOAConfirm() {
    if (!requireAdmin('reset chart of accounts')) return;
    document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">

                <button class="btn-outline" onclick="closeModal()">Cancel</button>

}

async function confirmResetCOA() {

}

// ── ACCOUNTS RECEIVABLE ──
function openAddAR(prefillClient='', prefillAmount=0) {
    if (!requireAdmin('edit accounts receivable')) return;
    document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-title">➕ Add Receivable</div>
            <div class="form-grid">
                <div><label>Client Name</label><input id="ar_client" placeholder="Client / Company name" value="${prefillClient}"></div>
                <div><label>Invoice Number</label><input id="ar_inv" placeholder="e.g. INV-001"></div>
                <div><label>Invoice Date</label><input type="date" id="ar_date"></div>
                <div><label>Due Date</label><input type="date" id="ar_due"></div>
                <div>
                    <label>Total Amount (PKR)</label>
                    <input type="number" id="ar_total" placeholder="0.00" value="${prefillAmount||''}" oninput="autoCalcARBalance()">
                </div>
                <div>
                    <label>Amount Received (PKR)</label>
                    <input type="number" id="ar_received" placeholder="0.00" oninput="autoCalcARBalance()">
                </div>
                <div class="form-full">
                    <label>Auto-Calculated Balance</label>
                    <div id="ar_balance_display" style="padding:10px 14px; background:var(--navy-750); border-radius:8px; font-size:14px; font-weight:700; color:var(--gold); margin-top:8px;">PKR 0.00 outstanding</div>
                </div>
                <div class="form-full"><label>Notes</label><textarea id="ar_notes" placeholder="Any additional notes…" rows="2"></textarea></div>
            </div>
            <div style="display:flex;gap:10px;margin-top:20px;">
                <button class="btn-primary" style="margin-top:0;" onclick="saveAR()">Save Receivable</button>
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>`;
    document.getElementById('ar_date').valueAsDate = new Date();
    if (prefillAmount) autoCalcARBalance();
}
function autoCalcARBalance() {
    const total = parseFloat(document.getElementById('ar_total').value)||0;
    const rcvd  = parseFloat(document.getElementById('ar_received').value)||0;
    const bal   = total - rcvd;
    const el    = document.getElementById('ar_balance_display');
    if (el) {
        el.textContent = `PKR ${bal.toLocaleString('en-PK',{minimumFractionDigits:2})} outstanding`;
        el.style.color = bal <= 0 ? 'var(--success)' : 'var(--gold)';
    }
}
async function saveAR() {
    if (!requireAdmin('edit accounts receivable')) return;
    const client   = document.getElementById('ar_client').value.trim();
    const inv      = document.getElementById('ar_inv').value.trim();
    const date     = document.getElementById('ar_date').value;
    const due      = document.getElementById('ar_due').value;
    const total    = parseFloat(document.getElementById('ar_total').value)||0;
    const received = parseFloat(document.getElementById('ar_received').value)||0;
    const notes    = document.getElementById('ar_notes').value.trim();
    if (!client||!total) { showToast('Client name and amount are required','error'); return; }
    const status = received>=total?'Paid':received>0?'Partial':'Unpaid';
    const newAR = {id:Date.now(), client, inv, date, due, total, received, notes, status};
    STATE.accountsReceivable.push(newAR);
    // Post double-entry: Dr Accounts Receivable / Cr Service Revenue
    glPostARInvoice(newAR);
    // If partial/paid at creation, also post the payment entry
    if (received > 0) glPostARPayment({...newAR, received}, 0);
    const synced = await persistAccountingNow('Receivable added!');
    closeModal();
    render();
    if (synced) await syncData(true);
}
function updateARPayment(id) {
    if (!requireAdmin('edit accounts receivable')) return;
    const ar = STATE.accountsReceivable.find(r => String(r.id)===String(id));
    if (!ar) return;
    document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal-box" style="max-width:420px;">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-title">💰 Record Payment — ${ar.client}</div>
            <div style="background:var(--navy-800); border-radius:8px; padding:12px; margin-bottom:14px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div><div style="font-size:11px; color:var(--text-muted);">INVOICED</div><div style="font-weight:700; color:var(--gold);">${fmt(ar.total)}</div></div>
                <div><div style="font-size:11px; color:var(--text-muted);">RECEIVED SO FAR</div><div style="font-weight:700; color:var(--success);">${fmt(ar.received)}</div></div>
                <div><div style="font-size:11px; color:var(--text-muted);">OUTSTANDING</div><div style="font-weight:700; color:var(--danger);">${fmt(ar.total-ar.received)}</div></div>
                <div><div style="font-size:11px; color:var(--text-muted);">STATUS</div><div><span class="badge badge-${ar.status.toLowerCase()}">${ar.status}</span></div></div>
            </div>
            <label>New Total Received (PKR)</label>
            <input type="number" id="ar_pay_amt" value="${ar.received}" placeholder="0.00" oninput="liveARBalance(${ar.total})">
            <div id="ar_pay_balance" style="font-size:12px; color:var(--text-secondary); margin-top:6px;"></div>
            <label>Payment Note</label>
            <input id="ar_pay_note" placeholder="e.g. Bank transfer on 15 Apr">
            <div style="display:flex;gap:10px;margin-top:20px;">
                <button class="btn-primary" style="margin-top:0;" onclick="saveARPayment('${id}')">Update Payment</button>
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>`;
    liveARBalance(ar.total);
}
function liveARBalance(total) {
    const rcvd = parseFloat(document.getElementById('ar_pay_amt').value)||0;
    const bal  = total - rcvd;
    const el   = document.getElementById('ar_pay_balance');
    if (el) el.innerHTML = `Remaining after this payment: <strong style="color:${bal<=0?'var(--success)':'var(--warning)'};">${fmt(bal)}</strong>`;
}
async function saveARPayment(id) {
    if (!requireAdmin('edit accounts receivable')) return;
    const ar = STATE.accountsReceivable.find(r => String(r.id)===String(id));
    if (!ar) return;
    const amt = parseFloat(document.getElementById('ar_pay_amt').value)||0;
    const previousReceived = ar.received || 0;
    ar.received = amt;
    ar.status   = amt>=ar.total?'Paid':amt>0?'Partial':'Unpaid';
    if (document.getElementById('ar_pay_note').value) ar.notes = document.getElementById('ar_pay_note').value;
    // Post double-entry: Dr Cash / Cr Accounts Receivable for the NEW amount received
    glPostARPayment(ar, previousReceived);
    const synced = await persistAccountingNow('Payment updated!');
    closeModal();
    render();
    if (synced) await syncData(true);
}
function deleteAR(id) {
    if (!requireAdmin('edit accounts receivable')) return;
    if (!confirm('Delete this receivable record?')) return;
    const ar = STATE.accountsReceivable.find(r => String(r.id)===String(id));
    if (ar) {
        const arIdStr = String(ar.id);
        // Invoice ref is now always "<inv>-<id>" or "AR-<id>"; payment refs are "PMT-<id>-<ts>"
        STATE.generalLedger = STATE.generalLedger.filter(e => {
            const ref = String(e.reference || '');
            return !ref.endsWith('-' + arIdStr) && !ref.startsWith('PMT-' + arIdStr + '-');
        });
        syncCOABalancesFromGL();
    }
    STATE.accountsReceivable = STATE.accountsReceivable.filter(r => String(r.id)!==String(id));
    persistAccountingNow('Receivable deleted!').then(async synced => {
        render();
        if (synced) await syncData(true);
    });
}

    if (!confirm('Delete this expense record?')) return;
    const expense = STATE.expenses.find(e => String(e.id) === String(id));
    if (expense) {
        const expRef = (expense.ref ? expense.ref + '-' + expense.id : 'EXP-' + expense.id);
        STATE.generalLedger = STATE.generalLedger.filter(e => String(e.reference || '') !== expRef);
        syncCOABalancesFromGL();
    }
    STATE.expenses = STATE.expenses.filter(e => String(e.id) !== String(id));
    persistAccountingNow('Expense deleted!').then(async synced => {
        render();
        if (synced) await syncData(true);
    });

// ── DOUBLE-ENTRY ACCOUNTING ENGINE ──────────────────────────────────────────
// Helper: find an account object in the COA by name (case-insensitive partial match)
function _findCOAAccount(type, nameFragment) {
    migrateCOA();
    const list = STATE.chartOfAccounts[type] || [];
    const lf = nameFragment.toLowerCase();
    return list.find(a => (a.name || '').toLowerCase().includes(lf)) || null;
}

// Get or create a default GL account stub when COA entry is missing
function _resolveGLAccount(type, nameFragment, fallbackCode, fallbackName) {
    const acc = _findCOAAccount(type, nameFragment);
    if (acc) return { code: acc.code, name: acc.name, type };
    return { code: fallbackCode, name: fallbackName, type };
}

// Post one balanced journal entry (debit + credit lines) to STATE.generalLedger
// entryPairs: [ { side:'debit'|'credit', accountType, nameFragment, fallbackCode, fallbackName, amount } ]
// ── SYNC COA BALANCES FROM GL ──────────────────────────────────────────────
// Recomputes every active COA account's .balance field from the current GL
// entries, respecting normal-balance direction per account type.
// Assets / Expenses  → normal Debit  → balance = totalDebits  − totalCredits
// Liabilities / Equity / Revenues → normal Credit → balance = totalCredits − totalDebits
function syncCOABalancesFromGL() {
    migrateCOA();
    const normalDebitTypes = new Set(['assets', 'expenses']);

    // Accumulate GL totals per accountCode
    const totals = {}; // code → { debit, credit }
    for (const entry of STATE.generalLedger) {
        const key = String(entry.accountCode);
        if (!totals[key]) totals[key] = { debit: 0, credit: 0 };
        totals[key].debit  += (entry.debit  || 0);
        totals[key].credit += (entry.credit || 0);
    }

    // Write back to COA accounts
    let changed = false;
    for (const [type] of Object.entries(COA_META)) {
        for (const acc of (STATE.chartOfAccounts[type] || [])) {
            const key = String(acc.code);
            const t = totals[key];
            if (!t) continue; // no GL entries for this account yet — leave manual balance intact
            const newBal = normalDebitTypes.has(type)
                ? (t.debit - t.credit)
                : (t.credit - t.debit);
            if (Math.abs((acc.balance || 0) - newBal) > 0.001) {
                acc.balance = parseFloat(newBal.toFixed(2));
                changed = true;
            }
        }
    }
    return changed;
}

function postJournalEntry(date, reference, description, entryPairs) {
    const ts = Date.now();
    entryPairs.forEach((p, i) => {
        const acct = _resolveGLAccount(p.accountType, p.nameFragment, p.fallbackCode, p.fallbackName);
        STATE.generalLedger.push({
            id: `${ts}_${i}_${Math.random().toString(36).slice(2,7)}`,
            date: date || new Date().toISOString().slice(0,10),
            accountCode: acct.code,
            accountName: acct.name,
            accountType: p.accountType,
            debit:  p.side === 'debit'  ? parseFloat(p.amount) || 0 : 0,
            credit: p.side === 'credit' ? parseFloat(p.amount) || 0 : 0,
            reference,
            description
        });
    });
    // Immediately reflect the new entries in the Chart of Accounts balances
    syncCOABalancesFromGL();
}

// Prevent duplicate GL entries for the same reference + side
function _glEntryExists(reference, side) {
    return STATE.generalLedger.some(e => e.reference === reference && (side === 'debit' ? e.debit > 0 : e.credit > 0));
}

// ── AR INVOICE CREATED: Dr Accounts Receivable / Cr Service Revenue ──
function glPostARInvoice(ar) {
    if (!ar || !(ar.total > 0)) return;
    // Always include ar.id in ref to guarantee uniqueness even if two invoices share the same inv number
    const ref = (ar.inv ? ar.inv + '-' + ar.id : 'AR-' + ar.id);
    if (_glEntryExists(ref, 'debit')) return; // already posted
    postJournalEntry(
        ar.date,
        ref,
        `Invoice issued — ${ar.client}`,
        [
            { side:'debit',  accountType:'assets',   nameFragment:'accounts receivable', fallbackCode:1020, fallbackName:'Accounts Receivable', amount: ar.total },
            { side:'credit', accountType:'revenues',  nameFragment:'service revenue',    fallbackCode:4010, fallbackName:'Service Revenue',      amount: ar.total },
        ]
    );
}

// ── PAYMENT RECEIVED: Dr Cash/Bank / Cr Accounts Receivable ──
function glPostARPayment(ar, previousReceived) {
    if (!ar) return;
    const newAmount = (ar.received || 0) - (previousReceived || 0);
    if (newAmount <= 0) return;
    const ref = `PMT-${ar.id}-${Date.now()}`;
    postJournalEntry(
        new Date().toISOString().slice(0,10),
        ref,
        `Payment received — ${ar.client} (${ar.inv || ar.id})`,
        [
            { side:'debit',  accountType:'assets', nameFragment:'cash',                fallbackCode:1010, fallbackName:'Cash',                 amount: newAmount },
            { side:'credit', accountType:'assets', nameFragment:'accounts receivable', fallbackCode:1020, fallbackName:'Accounts Receivable',  amount: newAmount },
        ]
    );
}

// ── EXPENSE RECORDED: Dr Expense Account / Cr Cash ──
function glPostExpense(expense) {
    if (!expense || !(expense.amount > 0)) return;
    // Always include expense.id to guarantee uniqueness
    const ref = (expense.ref ? expense.ref + '-' + expense.id : 'EXP-' + expense.id);
    if (_glEntryExists(ref, 'debit')) return;
    const expAcct = _resolveGLAccount('expenses', expense.type || 'expense', 5990, expense.type || 'General Expense');
    postJournalEntry(
        expense.date,
        ref,
        `Expense — ${expense.type}${expense.vendor ? ' / ' + expense.vendor : ''}`,
        [
            { side:'debit',  accountType:'expenses', nameFragment: expense.type || 'expense', fallbackCode: expAcct.code, fallbackName: expAcct.name, amount: expense.amount },
            { side:'credit', accountType:'assets',   nameFragment:'cash',                     fallbackCode:1010,          fallbackName:'Cash',          amount: expense.amount },
        ]
    );
}

// ── AP BILL CREATED: Dr Expense/Asset / Cr Accounts Payable ──
function glPostAPBill(ap) {
    if (!ap || !(ap.total > 0)) return;
    // Always include ap.id to guarantee uniqueness
    const ref = (ap.ref ? ap.ref + '-' + ap.id : 'AP-' + ap.id);
    if (_glEntryExists(ref, 'credit')) return;
    postJournalEntry(
        ap.date,
        ref,
        `Bill recorded — ${ap.vendor}`,
        [
            { side:'debit',  accountType:'expenses',    nameFragment:'expense',           fallbackCode:5990, fallbackName:'General Expense',   amount: ap.total },
            { side:'credit', accountType:'liabilities', nameFragment:'accounts payable',  fallbackCode:2010, fallbackName:'Accounts Payable',  amount: ap.total },
        ]
    );
}

// ── AP PAYMENT MADE: Dr Accounts Payable / Cr Cash ──
function glPostAPPayment(ap, previousPaid) {
    if (!ap) return;
    const newAmount = (ap.paid || 0) - (previousPaid || 0);
    if (newAmount <= 0) return;
    const ref = `APMT-${ap.id}-${Date.now()}`;
    postJournalEntry(
        new Date().toISOString().slice(0,10),
        ref,
        `Payment made — ${ap.vendor}`,
        [
            { side:'debit',  accountType:'liabilities', nameFragment:'accounts payable', fallbackCode:2010, fallbackName:'Accounts Payable', amount: newAmount },
            { side:'credit', accountType:'assets',      nameFragment:'cash',             fallbackCode:1010, fallbackName:'Cash',             amount: newAmount },
        ]
    );
}

// ── CASH TRANSACTION: route based on type ──
function glPostCashTransaction(tx) {
    if (!tx || !(tx.amount > 0)) return;
    // Always include tx.id to guarantee uniqueness
    const ref = (tx.ref ? tx.ref + '-' + tx.id : 'CB-' + tx.id);
    if (_glEntryExists(ref, 'debit') || _glEntryExists(ref, 'credit')) return;
    const isIn = ['Cash In', 'Bank Deposit'].includes(tx.type);
    if (isIn) {
        postJournalEntry(tx.date, ref, tx.desc || tx.type, [
            { side:'debit',  accountType:'assets',   nameFragment: tx.account && tx.account.toLowerCase().includes('bank') ? 'bank' : 'cash', fallbackCode:1010, fallbackName: tx.account || 'Cash', amount: tx.amount },
            { side:'credit', accountType:'revenues', nameFragment:'revenue',   fallbackCode:4010, fallbackName:'Revenue', amount: tx.amount },
        ]);
    } else {
        postJournalEntry(tx.date, ref, tx.desc || tx.type, [
            { side:'debit',  accountType:'expenses', nameFragment:'expense', fallbackCode:5990, fallbackName:'General Expense', amount: tx.amount },
            { side:'credit', accountType:'assets',   nameFragment: tx.account && tx.account.toLowerCase().includes('bank') ? 'bank' : 'cash', fallbackCode:1010, fallbackName: tx.account || 'Cash', amount: tx.amount },
        ]);
    }
}

// ── COMPUTE TRIAL BALANCE from GL ──
// Returns array: { code, name, type, debit, credit }
// For Assets/Expenses: normal balance is Debit → netDebit = totalDebits - totalCredits; shown in Debit col if positive
// For Liabilities/Equity/Revenues: normal balance is Credit → netCredit; shown in Credit col if positive
function computeTrialBalance() {
    migrateCOA();
    // Build map: accountCode → { name, type, totalDebit, totalCredit }
    const map = {};

    // Seed with all active COA accounts
    for (const [type, meta] of Object.entries(COA_META)) {
        for (const acc of (STATE.chartOfAccounts[type] || [])) {
            if (acc.active === false) continue;
            const key = String(acc.code);
            map[key] = { code: acc.code, name: acc.name, type, totalDebit: 0, totalCredit: 0 };
        }
    }

    // Accumulate GL entries
    for (const entry of STATE.generalLedger) {
        const key = String(entry.accountCode);
        if (!map[key]) {
            // Account exists in GL but not seeded from COA — add it
            map[key] = { code: entry.accountCode, name: entry.accountName, type: entry.accountType, totalDebit: 0, totalCredit: 0 };
        }
        map[key].totalDebit  += (entry.debit  || 0);
        map[key].totalCredit += (entry.credit || 0);
    }

    const normalDebitTypes = new Set(['assets', 'expenses']);
    const rows = [];

    for (const acc of Object.values(map)) {
        const net = acc.totalDebit - acc.totalCredit;
        let debitBalance = 0, creditBalance = 0;
        if (normalDebitTypes.has(acc.type)) {
            if (net >= 0) debitBalance = net; else creditBalance = -net;
        } else {
            if (net <= 0) creditBalance = -net; else debitBalance = net;
        }
        rows.push({ code: acc.code, name: acc.name, type: acc.type, debitBalance, creditBalance });
    }

    rows.sort((a, b) => (parseInt(a.code) || 0) - (parseInt(b.code) || 0));
    return rows;
}

// ── GL HELPERS for running balance in the ledger view ──
function computeGLRunningBalance(entries, accountType) {
    const normalDebit = ['assets','expenses'].includes(accountType);
    let balance = 0;
    return entries.map(e => {
        if (normalDebit) {
            balance += (e.debit || 0) - (e.credit || 0);
        } else {
            balance += (e.credit || 0) - (e.debit || 0);
        }
        return { ...e, runningBalance: balance };
    });
}

// ── GL & TB RENDER FUNCTIONS ──────────────────────────────────────────────

    for (const [type, meta] of Object.entries(COA_META)) {
        for (const acc of (STATE.chartOfAccounts[type] || [])) {
            if (acc.active === false) continue;
            accountOptions.push({ code: acc.code, name: acc.name, type, label: `${acc.code} — ${acc.name}` });
        }
    }
    // Add GL accounts not in COA
    for (const e of STATE.generalLedger) {
        if (!accountOptions.find(a => String(a.code) === String(e.accountCode))) {
            accountOptions.push({ code: e.accountCode, name: e.accountName, type: e.accountType, label: `${e.accountCode} — ${e.accountName}` });
        }

    accountOptions.sort((a, b) => (parseInt(a.code)||0) - (parseInt(b.code)||0));

    // Filter GL entries
    let filtered = [...STATE.generalLedger];
    if (STATE.glAccountFilter && STATE.glAccountFilter !== 'all') {
        filtered = filtered.filter(e => String(e.accountCode) === STATE.glAccountFilter);
    }

    if (STATE.glDateTo)   filtered = filtered.filter(e => (e.date || '') <= STATE.glDateTo);

        const da = new Date(a.date || 0), db = new Date(b.date || 0);
        return da - db || String(a.id).localeCompare(String(b.id));

    // Determine account type for running balance direction
    const selectedType = STATE.glAccountFilter !== 'all'

    const withBalance = computeGLRunningBalance(filtered, selectedType);

    const totalDebit  = filtered.reduce((s, e) => s + (e.debit  || 0), 0);
    const totalCredit = filtered.reduce((s, e) => s + (e.credit || 0), 0);

    </div>

        <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
            <div style="flex:1; min-width:200px;">

function exportGL() {

        rows.push([e.date||'', e.accountCode||'', e.accountName||'', e.accountType||'', e.description||'', e.reference||'', e.debit||0, e.credit||0]);

async function saveGLEntryEdit(id) {
    if (!requireAdmin('edit general ledger entries')) return;
    const idx = STATE.generalLedger.findIndex(e => String(e.id) === String(id));
    if (idx === -1) return;

    const date = document.getElementById('gl_edit_date').value;
    const accountVal = document.getElementById('gl_edit_account').value;
    const [accountCode, accountName, accountType] = accountVal.split('|');
    const debit  = parseFloat(document.getElementById('gl_edit_debit').value)  || 0;
    const credit = parseFloat(document.getElementById('gl_edit_credit').value) || 0;
    const description = document.getElementById('gl_edit_desc').value.trim();
    const reference   = document.getElementById('gl_edit_ref').value.trim();

    if (debit > 0 && credit > 0) {
        showToast('An entry cannot have both Debit and Credit. Set one to 0.', 'error');
        return;
    }
    if (debit === 0 && credit === 0) {
        showToast('Enter either a Debit or Credit amount.', 'error');
        return;
    }

    STATE.generalLedger[idx] = {
        ...STATE.generalLedger[idx],
        date, accountCode, accountName, accountType, debit, credit, description, reference
    };

    syncCOABalancesFromGL();
    const synced = await persistAccountingNow('GL entry updated!');
    closeModal();
    render();
    if (synced) await syncData(true);
}

function deleteGLEntry(id) {
    if (!requireAdmin('delete general ledger entries')) return;
    if (!confirm('Delete this GL entry? This will affect Trial Balance and Chart of Accounts balances.')) return;
    STATE.generalLedger = STATE.generalLedger.filter(e => String(e.id) !== String(id));
    syncCOABalancesFromGL();
    persistAccountingNow('GL entry deleted!').then(async synced => {
        render();
        if (synced) await syncData(true);
    });
}

function statusBadge(s) {
    const map = {'Pending':'badge-pending','In Progress':'badge-inprogress','Completed':'badge-completed','Canceled':'badge-canceled'};
    return `<span class="badge ${map[s]||'badge-pending'}">${s||'Pending'}</span>`;
}

function sortTasksByMode(taskList, mode) {
    const list = [...taskList];
    if (mode === 'highest_paid') {
        return list.sort((a, b) => (parseFloat(b.arAmount) || 0) - (parseFloat(a.arAmount) || 0));
    }
    // Default/newest: prefer createdAt date, fallback to numeric id.
    return list.sort((a, b) => {
        const aDate = Date.parse(a.createdAt || '') || 0;
        const bDate = Date.parse(b.createdAt || '') || 0;
        if (bDate !== aDate) return bDate - aDate;
        return (parseInt(b.id, 10) || 0) - (parseInt(a.id, 10) || 0);
    });
}
