        return `
        <div class="stats-row">
            <div class="stat-card"><div class="stat-label">My Total Cases</div><div class="stat-val accent">${myTasks.length}</div></div>
            <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-val gold">${myPending}</div></div>
            <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-val accent">${myInProgress}</div></div>
            <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-val green">${myDone}</div></div>
        </div>
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">✅ My Tasks</div>
                    <div class="card-subtitle">All cases assigned to ${STATE.user.name}</div>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="font-size:12px; color:var(--text-secondary);">Sort by</span>
                    <select class="status-select" onchange="STATE.myTaskSort=this.value;render()">
                        <option value="newest" ${STATE.myTaskSort==='newest'?'selected':''}>Newest</option>
                        <option value="highest_paid" ${STATE.myTaskSort==='highest_paid'?'selected':''}>Highest Paid</option>
                    </select>
                </div>
            </div>
            ${myTasks.length===0 ? `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">No tasks assigned to you yet.</div></div>` :
            `<table><thead><tr>
                <th>Client & Type</th><th>Priority</th><th>Status</th><th>Amount Recv.</th><th>Description</th><th>Actions</th>
            </tr></thead>
            <tbody>${sortedMyTasks.map(t => {
                const linkedAR = STATE.accountsReceivable.find(r=>String(r.linkedTaskId)===String(t.id));
                return `<tr>
                    <td>
                        <div class="td-title">${t.title||'—'}</div>
                        <div class="td-sub">${t.type||'Filing'} · ${formatDateTime(t.createdAt)}</div>
                    </td>
                    <td><span class="badge badge-${(t.prio||'medium').toLowerCase()}">${t.prio||'Medium'}</span></td>
                    <td>${statusBadge(t.status)}</td>
                    <td>${t.arAmount ? `<span class="ar-link">💰 ${fmt(t.arAmount)}</span>` : '—'}</td>
                    <td style="max-width:160px;"><div style="font-size:12px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.desc||'—'}</div></td>
                    <td>
                        <div class="btn-action-group">
                            <button class="btn-sm" onclick="openViewTask('${t.id}')">👁 View</button>
                            <button class="btn-sm success" onclick="openViewTask('${t.id}')">✏️ Edit</button>
                        </div>
                    </td>
                </tr>`;
            }).join('')}</tbody></table>`}
        </div>`;
    }

    // ── CASE PIPELINE ──
    if (STATE.tab==='tasks') {
        const pending    = tasks.filter(t=>t.status==='Pending');
        const inProgress = tasks.filter(t=>t.status==='In Progress');
        const done       = tasks.filter(t=>t.status==='Completed');
        const canceled   = tasks.filter(t=>t.status==='Canceled');
        const isAdmin = isAdminUser();
        const canStatusEditTasks = canEditTaskStatus();
        const visibleTasks = tasks;
        const sortedVisibleTasks = sortTasksByMode(visibleTasks, STATE.caseSort);

        return `
        <div class="stats-row">
            <div class="stat-card" style="cursor:pointer;" onclick="openPipelineCasesModal('all', 'Total Cases')"><div class="stat-label">Total Cases</div><div class="stat-val accent">${tasks.length}</div></div>
            <div class="stat-card" style="cursor:pointer;" onclick="openPipelineCasesModal('Pending', 'Pending Cases')"><div class="stat-label">Pending</div><div class="stat-val gold">${pending.length}</div></div>
            <div class="stat-card" style="cursor:pointer;" onclick="openPipelineCasesModal('In Progress', 'In Progress Cases')"><div class="stat-label">In Progress</div><div class="stat-val accent">${inProgress.length}</div></div>
            <div class="stat-card" style="cursor:pointer;" onclick="openPipelineCasesModal('Completed', 'Completed Cases')"><div class="stat-label">Completed</div><div class="stat-val green">${done.length}</div></div>
            <div class="stat-card" style="cursor:pointer;" onclick="openPipelineCasesModal('Canceled', 'Canceled Cases')"><div class="stat-label">Canceled</div><div class="stat-val red">${canceled.length}</div></div>
            <div class="stat-card" style="cursor:pointer;" onclick="openTeamMembersProgress()"><div class="stat-label">Team Members</div><div class="stat-val">${users.length}</div></div>
        </div>
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">📂 Case Pipeline</div>
                    <div class="card-subtitle">${visibleTasks.length} cases visible</div>
                </div>
                <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                    <span style="font-size:12px; color:var(--text-secondary);">Sort by</span>
                    <select class="status-select" onchange="STATE.caseSort=this.value;render()">
                        <option value="newest" ${STATE.caseSort==='newest'?'selected':''}>Newest</option>
                        <option value="highest_paid" ${STATE.caseSort==='highest_paid'?'selected':''}>Highest Paid</option>
                    </select>
                    ${isAdmin ? `<button class="btn-sm success" onclick="STATE.tab='create';render()">➕ New Task</button>` : ''}
                </div>
            </div>
            ${visibleTasks.length===0 ? `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No cases yet</div></div>` :
            `<table><thead><tr>
                <th>Client &amp; Type</th>
                <th>Assigned To</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Amount Recv.</th>
                <th>Actions</th>
            </tr></thead>
            <tbody>${sortedVisibleTasks.map(t => {
                const linkedAR = STATE.accountsReceivable.find(r=>String(r.linkedTaskId)===String(t.id));
                return `<tr>
                    <td>
                        <div class="td-title">${t.title||'—'}</div>
                        <div class="td-sub">${t.type||'Filing'} · ${formatDateTime(t.createdAt)}</div>
                    </td>
                    <td style="color:var(--text-secondary); font-size:13px;">${t.name||'—'}</td>
                    <td><span class="badge badge-${(t.prio||'medium').toLowerCase()}">${t.prio||'Medium'}</span></td>
                    <td>${statusBadge(t.status)}</td>
                    <td>${t.arAmount ? `<span class="ar-link">💰 ${fmt(t.arAmount)}</span>` : '—'}</td>
                    <td>
                        <div class="btn-action-group">
                            <button class="btn-sm" onclick="openViewTask('${t.id}')">👁 View</button>
                            ${canStatusEditTasks ? `<button class="btn-sm success" onclick="openViewTask('${t.id}')">✏️ Progress</button>` : ''}
                            ${isAdmin ? `<button class="btn-sm warning" onclick="openReassignTask('${t.id}')">🔄 Reassign</button>` : ''}
                            ${isAdmin ? `<button class="btn-sm danger" onclick="deleteTask('${t.id}')">🗑 Delete</button>` : ''}
                        </div>
                    </td>
                </tr>`;
            }).join('')}</tbody></table>`}
        </div>`;
    }

    // ── LEADERBOARD ──
    if (STATE.tab==='team') {
        // Count tasks per person dynamically
        const taskCounts = {};
        tasks.forEach(t => {
            if (t.name) {
                if (!taskCounts[t.name]) taskCounts[t.name] = {total:0, completed:0, pending:0, inprogress:0};
                taskCounts[t.name].total++;
                if (t.status==='Completed') taskCounts[t.name].completed++;
                if (t.status==='Pending') taskCounts[t.name].pending++;
                if (t.status==='In Progress') taskCounts[t.name].inprogress++;
            }
        });

        const filterBtn = (label, val) => `<button class="btn-sm ${STATE.leaderFilter===val?'success':''}" onclick="STATE.leaderFilter='${val}';render()">${label}</button>`;

        let filteredUsers = users;
        if (STATE.leaderFilter==='employee') filteredUsers = users.filter(u=>u.role==='Employee');
        if (STATE.leaderFilter==='consultant') filteredUsers = users.filter(u=>u.role==='Consultant');

        const sorted = [...filteredUsers].sort((a,b) => {
            const ac = (taskCounts[a.name]?.total||0);
            const bc = (taskCounts[b.name]?.total||0);
            return bc - ac;
        });
        const maxTasks = sorted.length ? Math.max(...sorted.map(u=>taskCounts[u.name]?.total||0), 1) : 1;
        const rankClasses = ['gold','silver','bronze'];

        return `
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">🏆 Team Leaderboard</div>
                    <div class="card-subtitle">Ranked by total assigned tasks</div>
                </div>
                <div style="display:flex; gap:6px;">
                    ${filterBtn('All', 'all')}
                    ${filterBtn('Employees', 'employee')}
                    ${filterBtn('Consultants', 'consultant')}
                </div>
            </div>
            ${sorted.length===0 ? `<div class="empty"><div class="empty-icon">🏆</div><div class="empty-text">No team data yet</div></div>` :
            `<table><thead><tr>
                <th>Rank</th><th>Team Member</th><th>Role</th><th>Total Tasks</th><th>Completed</th><th>In Progress</th><th>Pending</th><th>Progress</th>
            </tr></thead>
            <tbody>${sorted.map((u,i) => {
                const tc = taskCounts[u.name]||{total:0,completed:0,pending:0,inprogress:0};
                const pct = maxTasks > 0 ? Math.round((tc.total/maxTasks)*100) : 0;
                return `<tr>
                    <td><span class="leader-rank ${rankClasses[i]||''}">#${i+1}</span></td>
                    <td>
                        <div class="leader-info" style="margin-left:0;">
                            ${avatarHtml(u.pic, u.name, 'avatar-sm')}
                            <div class="leader-name">${u.name}</div>
                        </div>
                    </td>
                    <td><span class="badge ${u.role==='Consultant'?'badge-consultant':'badge-role'}">${u.role||'Employee'}</span></td>
                    <td style="font-weight:700; color:var(--accent);">${tc.total}</td>
                    <td style="color:var(--success); font-weight:600;">${tc.completed}</td>
                    <td style="color:var(--navy-300); font-weight:600;">${tc.inprogress}</td>
                    <td style="color:var(--warning); font-weight:600;">${tc.pending}</td>
                    <td style="min-width:120px;">
                        <div class="score-bar-wrap" style="margin:0;">
                            <div class="score-bar" style="width:${pct}%"></div>
                        </div>
                    </td>
                </tr>`;
            }).join('')}</tbody></table>`}
        </div>`;
    }

    // ── NEW TASK ──
    if (STATE.tab==='create') {
        const emps = STATE.allData.filter(u => u.role==='Employee' || u.role==='Consultant');
        return `
        <div class="card" style="max-width:640px">
            <div class="card-header">
                <div>
                    <div class="card-title">➕ Assign New Task</div>
                    <div class="card-subtitle">Create and assign a case to a team member</div>
                </div>
            </div>
            <div class="form-grid">
                <div>
                    <label>Client Name</label>
                    <input id="t_title" placeholder="Full name of client">
                </div>
                <div>
                    <label>Case Type ${isAdmin ? `<button type="button" class="btn-sm" style="margin-left:6px;padding:2px 8px;font-size:11px;" onclick="openManageCaseTypes()">⚙ Manage</button>` : ''}</label>
                    <select id="t_type">
                        ${(STATE.caseTypes && STATE.caseTypes.length ? STATE.caseTypes : defaultCaseTypes()).map(ct => `<option>${escapeAttr(ct)}</option>`).join('')}
                    </select>
                </div>
                <div>
                    <label>Priority</label>
                    <select id="t_prio">
                        <option>High</option>
                        <option selected>Medium</option>
                        <option>Low</option>
                    </select>
                </div>
                <div>
                    <label>Assign To</label>
                    <select id="t_to">
                        ${emps.map(e=>`<option value="${e.name}">${e.name} (${e.role})</option>`).join('')}
                    </select>
                </div>
                <div>
                    <label>💰 Amount Receivable from Client (PKR)</label>
                    <input type="number" id="t_ar_amount" placeholder="0.00 — leave blank if none">
                </div>
                <div style="display:flex; align-items:center; gap:10px; margin-top:24px; padding:10px 14px; background:var(--navy-800); border-radius:8px; border:1px solid var(--border);">
                    <input type="checkbox" id="t_add_ar" style="width:auto; margin:0; cursor:pointer;" checked>
                    <label for="t_add_ar" style="margin:0; text-transform:none; font-size:13px; color:var(--text-primary); cursor:pointer;">Auto-add to Accounts Receivable</label>
                </div>
                <div class="form-full">
                    <label>Description / Notes</label>
                    <textarea id="t_desc" placeholder="Add any relevant notes, deadlines, or instructions…"></textarea>
                </div>
            </div>
            <div style="margin-top:20px">
                <button class="btn-primary" style="width:auto; padding:10px 28px;" onclick="createTask()">Assign Task →</button>
            </div>
        </div>`;
    }

    // ── MANAGE TEAM ──
    if (STATE.tab==='users') {
        return `
        <div class="card" style="max-width:520px">
            <div class="card-header">
                <div>
                    <div class="card-title">➕ Add Team Member</div>
                    <div class="card-subtitle">Only Admin can create or remove staff accounts</div>
                </div>
            </div>
            <div class="form-grid">
                <div><label>Full Name</label><input id="u_name" placeholder="e.g. Ahmed Ali"></div>
                <div><label>Role</label><select id="u_role"><option>Employee</option><option>Consultant</option><option>Admin</option></select></div>
                <div><label>Username</label><input id="u_un" placeholder="e.g. ahmed.ali"></div>
                <div><label>Password</label><input type="password" id="u_pw" placeholder="Set a password"></div>
                <div class="form-full">${profilePicUploadHtml('u_pic', '', '')}</div>
            </div>
            <div style="margin-top:20px">
                <button id="u_submit" class="btn-primary" style="width:auto; padding:10px 28px;" onclick="addUser()">Create Account →</button>
            </div>
        </div>
        <div class="card" style="max-width:520px;">
            <div class="card-header">
                <div class="card-title">👥 Current Team Members</div>
            </div>
            ${users.length===0 ? '<div class="empty"><div class="empty-text">No team members yet</div></div>' :
            `<table><thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Actions</th></tr></thead>
            <tbody>${users.map(u=>`
                <tr>
                    <td>
                        <div style="display:flex; align-items:center; gap:10px;">
                            ${avatarHtml(u.pic, u.name, 'avatar-sm')}
                            <div class="td-title">${u.name}</div>
                        </div>
                    </td>
                    <td style="color:var(--text-secondary);">${u.un}</td>
                    <td><span class="badge ${u.role==='Consultant'?'badge-consultant':'badge-role'}">${u.role||'Employee'}</span></td>
                    <td>
                        <div class="btn-action-group">
                            <button class="btn-sm" onclick="openEditUser('${u.id}')">✏️ Edit</button>
                            <button class="btn-sm danger" onclick="deleteUser('${u.id}', '${u.un}')">🗑 Delete</button>
                        </div>
                    </td>
                </tr>`).join('')}
            </tbody></table>`}
        </div>`;
    }

    // ── CHART OF ACCOUNTS ──
    if (STATE.tab==='coa') {
        return renderCOA(isAdmin);
    }

    // ── GENERAL LEDGER ──
    if (STATE.tab==='gl') {
        return renderGL(isAdmin);
    }

    // ── TRIAL BALANCE ──
    if (STATE.tab==='tb') {
        return renderTB(isAdmin);
    }

    // ── ACCOUNTS RECEIVABLE ──
    if (STATE.tab==='ar') {
        const totalAR   = STATE.accountsReceivable.reduce((s,r)=>s+r.total,0);
        const totalRcvd = STATE.accountsReceivable.reduce((s,r)=>s+r.received,0);
        const totalOwed = totalAR - totalRcvd;
        const paidCount = STATE.accountsReceivable.filter(r=>r.status==='Paid').length;
        const partialCount = STATE.accountsReceivable.filter(r=>r.status==='Partial').length;
        const unpaidCount= STATE.accountsReceivable.filter(r=>r.status!=='Paid').length;
        const collRate = totalAR>0?((totalRcvd/totalAR)*100).toFixed(1):'0.0';
        const arFiltered = sortReceivables(
            STATE.accountsReceivable.filter(r => matchesSearch(r, STATE.arSearch, ['client', 'inv', 'notes', 'status', 'date', 'due'])),
            STATE.arSort
        );

        return `
        <div class="stats-row">
            <div class="stat-card"><div class="stat-label">Total Invoiced</div><div class="stat-val accent" style="font-size:18px;">${fmt(totalAR)}</div></div>
            <div class="stat-card"><div class="stat-label">Total Received</div><div class="stat-val green" style="font-size:18px;">${fmt(totalRcvd)}</div></div>
            <div class="stat-card"><div class="stat-label">Outstanding</div><div class="stat-val gold" style="font-size:18px;">${fmt(totalOwed)}</div></div>
            <div class="stat-card"><div class="stat-label">Collection Rate</div><div class="stat-val ${parseFloat(collRate)>=70?'green':'gold'}">${collRate}%</div></div>
            <div class="stat-card"><div class="stat-label">Cleared</div><div class="stat-val green">${paidCount}</div></div>
            <div class="stat-card"><div class="stat-label">Partial</div><div class="stat-val gold">${partialCount}</div></div>
            <div class="stat-card"><div class="stat-label">Unpaid</div><div class="stat-val red">${unpaidCount}</div></div>
        </div>
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">💰 Accounts Receivable</div>
                    <div class="card-subtitle">Track money owed by clients — amounts auto-calculated</div>
                </div>
                ${isAdminUser() ? `<button class="btn-sm success" onclick="openAddAR()">+ Add Receivable</button>` : ''}
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
                <input id="search_ar" value="${escapeAttr(STATE.arSearch)}" oninput="setSearchValue('arSearch', this.value)" placeholder="Search receivables" style="max-width:280px; margin-top:0;">
                <select class="status-select" onchange="STATE.arSort=this.value;render()">
                    <option value="newest" ${STATE.arSort==='newest'?'selected':''}>Newest</option>
                    <option value="highest" ${STATE.arSort==='highest'?'selected':''}>Highest</option>
                    <option value="unpaid" ${STATE.arSort==='unpaid'?'selected':''}>Unpaid</option>
                    <option value="paid" ${STATE.arSort==='paid'?'selected':''}>Paid</option>
                </select>
            </div>
            ${arFiltered.length===0
                ? `<div class="empty"><div class="empty-icon">💰</div><div class="empty-text">${STATE.accountsReceivable.length===0 ? 'No receivables recorded yet. Add your first client invoice above.' : 'No receivables match the current search/filter.'}</div></div>`
                : `<table><thead><tr>
                    <th>Client</th><th>Invoice #</th><th>Date</th><th>Due</th>
                    <th>Total</th><th>Received</th><th>Balance</th><th>Status</th><th>Action</th>
                </tr></thead>
                <tbody>${arFiltered.map(r => `
                <tr>
                    <td>
                        <div class="td-title">${r.client}</div>
                        ${r.notes?`<div class="td-sub">${r.notes}</div>`:''}
                        ${r.linkedTaskId?`<div style="margin-top:3px;"><span class="ar-link">🔗 Task</span></div>`:''}
                    </td>
                    <td style="color:var(--text-secondary);">${r.inv||'—'}</td>
                    <td style="font-size:12px;">${formatDateTime(r.date)}</td>
                    <td style="font-size:12px; color:${r.due&&new Date(r.due)<new Date()&&r.status!=='Paid'?'var(--danger)':'var(--text-secondary)'};">${r.due ? formatDateTime(r.due) : '—'}</td>
                    <td class="amount-gold">${fmt(r.total)}</td>
                    <td class="amount-green">${fmt(r.received)}</td>
                    <td class="${r.total-r.received>0?'amount-red':'amount-green'}">${fmt(r.total-r.received)}</td>
                    <td><span class="badge badge-${r.status.toLowerCase()}">${r.status}</span></td>
                    <td style="white-space:nowrap;">
                        <div class="btn-action-group">
                            ${isAdminUser() ? `<button class="btn-sm success" onclick="updateARPayment('${r.id}')">💰 Pay</button>` : ''}
                            ${isAdminUser() ? `<button class="btn-sm danger" onclick="deleteAR('${r.id}')">🗑</button>` : ''}
                        </div>
                    </td>
                </tr>`).join('')}
                </tbody></table>`}
        </div>`;
    }

    // ── ACCOUNTS PAYABLE ──
    if (STATE.tab==='ap') {
        const totalAP   = STATE.accountsPayable.reduce((s,p)=>s+p.total,0);
        const totalPaid = STATE.accountsPayable.reduce((s,p)=>s+p.paid,0);
        const totalDue  = totalAP - totalPaid;
        const paidCnt   = STATE.accountsPayable.filter(p=>p.status==='Paid').length;
        const partialCnt= STATE.accountsPayable.filter(p=>p.status==='Partial').length;
        const unpaidCnt = STATE.accountsPayable.filter(p=>p.status!=='Paid').length;
        const apFiltered = sortByNewest(
            STATE.accountsPayable.filter(p => matchesSearch(p, STATE.apSearch, ['vendor', 'ref', 'notes', 'status', 'date', 'due']))
        );

        return `
        <div class="stats-row">
            <div class="stat-card"><div class="stat-label">Total Payable</div><div class="stat-val red" style="font-size:18px;">${fmt(totalAP)}</div></div>
            <div class="stat-card"><div class="stat-label">Total Paid</div><div class="stat-val green" style="font-size:18px;">${fmt(totalPaid)}</div></div>
            <div class="stat-card"><div class="stat-label">Outstanding</div><div class="stat-val gold" style="font-size:18px;">${fmt(totalDue)}</div></div>
            <div class="stat-card"><div class="stat-label">Cleared</div><div class="stat-val green">${paidCnt}</div></div>
            <div class="stat-card"><div class="stat-label">Partial</div><div class="stat-val gold">${partialCnt}</div></div>
            <div class="stat-card"><div class="stat-label">Unpaid</div><div class="stat-val red">${unpaidCnt}</div></div>
        </div>
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">💳 Accounts Payable</div>
                    <div class="card-subtitle">Track money owed to vendors — amounts auto-calculated</div>
                </div>
                ${isAdminUser() ? `<button class="btn-sm danger" style="border-color:rgba(239,68,68,0.4);" onclick="openAddAP()">+ Add Payable</button>` : ''}
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
                <input id="search_ap" value="${escapeAttr(STATE.apSearch)}" oninput="setSearchValue('apSearch', this.value)" placeholder="Search payables" style="max-width:280px; margin-top:0;">
            </div>
            ${apFiltered.length===0
                ? `<div class="empty"><div class="empty-icon">💳</div><div class="empty-text">${STATE.accountsPayable.length===0 ? 'No payables recorded yet.' : 'No payables match the current search.'}</div></div>`
                : `<table><thead><tr>
                    <th>Vendor</th><th>Reference</th><th>Date</th><th>Due</th>
                    <th>Total</th><th>Paid</th><th>Balance</th><th>Status</th><th>Action</th>
                </tr></thead>
                <tbody>${apFiltered.map(p => `
                <tr>
                    <td><div class="td-title">${p.vendor}</div>${p.notes?`<div class="td-sub">${p.notes}</div>`:''}</td>
                    <td style="color:var(--text-secondary);">${p.ref||'—'}</td>
                    <td style="font-size:12px;">${formatDateTime(p.date)}</td>
                    <td style="font-size:12px; color:${p.due&&new Date(p.due)<new Date()&&p.status!=='Paid'?'var(--danger)':'var(--text-secondary)'};">${p.due ? formatDateTime(p.due) : '—'}</td>
                    <td class="amount-red">${fmt(p.total)}</td>
                    <td class="amount-green">${fmt(p.paid)}</td>
                    <td class="${p.total-p.paid>0?'amount-red':'amount-green'}">${fmt(p.total-p.paid)}</td>
                    <td><span class="badge badge-${p.status.toLowerCase()}">${p.status}</span></td>
                    <td style="white-space:nowrap;">
                        <div class="btn-action-group">
                            ${isAdminUser() ? `<button class="btn-sm" onclick="updateAPPayment('${p.id}')">💸 Pay</button>` : ''}
                            ${isAdminUser() ? `<button class="btn-sm danger" onclick="deleteAP('${p.id}')">🗑</button>` : ''}
                        </div>
                    </td>
                </tr>`).join('')}
                </tbody></table>`}
        </div>`;
    }

    // ── EXPENSES ──
    if (STATE.tab==='expenses') {
        const expenseFiltered = sortByNewest(
            STATE.expenses.filter(e =>
                matchesDateRange(e, STATE.expenseDateFrom, STATE.expenseDateTo, 'date') &&
                matchesSearch(e, STATE.expenseSearch, ['type', 'vendor', 'ref', 'notes', 'date'])
            )
        );
        const totalCashReceived = STATE.officeExpenseCash.reduce((s, c) => s + (c.amount || 0), 0);
        const totalExpensesMade = STATE.expenses.reduce((s, e) => s + (e.amount || 0), 0);
        const remainingOfficeCash = totalCashReceived - totalExpensesMade;
        const officeCashFiltered = sortByNewest(
            STATE.officeExpenseCash.filter(c => matchesSearch(c, STATE.officeCashSearch, ['date', 'source', 'ref', 'notes']))
        );

        return `
        <div class="stats-row">
            <div class="stat-card"><div class="stat-label">Cash Received</div><div class="stat-val green" style="font-size:18px;">${fmt(totalCashReceived)}</div></div>
            <div class="stat-card"><div class="stat-label">Expenses Made</div><div class="stat-val red" style="font-size:18px;">${fmt(totalExpensesMade)}</div></div>
            <div class="stat-card"><div class="stat-label">Remaining Cash</div><div class="stat-val ${remainingOfficeCash >= 0 ? 'green' : 'red'}" style="font-size:18px;">${fmt(remainingOfficeCash)}</div></div>
            <div class="stat-card"><div class="stat-label">Expense Records</div><div class="stat-val accent">${STATE.expenses.length}</div></div>
        </div>
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">💵 Office Expense Cash Fund</div>
                    <div class="card-subtitle">Add cash for office expenses — remaining balance updates automatically</div>
                </div>
                ${isAdminUser() ? `<button class="btn-sm success" onclick="openAddOfficeCash()">+ Add Cash</button>` : ''}
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
                <input id="search_office_cash" value="${escapeAttr(STATE.officeCashSearch)}" oninput="setSearchValue('officeCashSearch', this.value)" placeholder="Search cash receipts" style="max-width:280px; margin-top:0;">
            </div>
            ${officeCashFiltered.length === 0
                ? `<div class="empty"><div class="empty-icon">💵</div><div class="empty-text">${STATE.officeExpenseCash.length === 0 ? 'No cash added yet. Add cash to fund office expenses.' : 'No cash receipts match the current search.'}</div></div>`
                : `<table><thead><tr>
                    <th>Date</th><th>Received From</th><th>Reference</th><th>Amount</th><th>Notes</th><th>Action</th>
                </tr></thead>
                <tbody>${officeCashFiltered.map(c => `
                <tr>
                    <td style="font-size:12px;">${formatDateTime(c.date)}</td>
                    <td><div class="td-title">${c.source || '—'}</div></td>
                    <td style="color:var(--text-secondary);">${c.ref || '—'}</td>
                    <td class="amount-green">${fmt(c.amount)}</td>
                    <td style="color:var(--text-secondary); font-size:12px;">${c.notes || '—'}</td>
                    <td style="white-space:nowrap;">
                        ${isAdminUser() ? `<button class="btn-sm danger" onclick="deleteOfficeCash('${c.id}')">🗑</button>` : ''}
                    </td>
                </tr>`).join('')}
                </tbody></table>`}
        </div>

        <div class="card" style="margin-top:20px;">
            <div class="card-header">
                <div>
                    <div class="card-title">🏷 Expense Types</div>
                    <div class="card-subtitle">Manage categories for recording expenses</div>
                </div>
                ${isAdminUser() ? `<button class="btn-sm" onclick="openAddExpenseType()">+ Add Type</button>` : ''}
            </div>
            ${STATE.expenseTypes.length === 0
                ? `<div class="empty"><div class="empty-icon">🏷</div><div class="empty-text">No expense types yet. Add types to categorize expenses.</div></div>`
                : `<div style="display:flex; flex-wrap:wrap; gap:8px;">${STATE.expenseTypes.map((t, idx) => `
                    <span class="badge badge-unpaid" style="display:inline-flex; align-items:center; gap:6px; padding:6px 10px;">
                        ${t}
                        ${isAdminUser() ? `<button class="btn-sm danger" style="padding:2px 6px; font-size:11px;" onclick="deleteExpenseType(${idx})">×</button>` : ''}
                    </span>`).join('')}
                </div>`}
        </div>

        <div class="card" style="margin-top:20px;">
            <div class="card-header">
                <div>
                    <div class="card-title">🧾 Office Expenses</div>
                    <div class="card-subtitle">Record and view all office expenses — filter by date range</div>
                </div>
                ${isAdminUser() ? `<button class="btn-sm danger" style="border-color:rgba(239,68,68,0.4);" onclick="openAddExpense()">+ Add Expense</button>` : ''}
            </div>
            <div class="stats-row" style="margin-bottom:16px;">
                <div class="stat-card"><div class="stat-label">Filtered Total</div><div class="stat-val red" style="font-size:18px;">${fmt(expenseFiltered.reduce((s, e) => s + (e.amount || 0), 0))}</div></div>
                <div class="stat-card"><div class="stat-label">Records Shown</div><div class="stat-val accent">${expenseFiltered.length}</div></div>
                <div class="stat-card"><div class="stat-label">All Expenses</div><div class="stat-val">${STATE.expenses.length}</div></div>
                <div class="stat-card"><div class="stat-label">Remaining Cash</div><div class="stat-val ${remainingOfficeCash >= 0 ? 'green' : 'red'}">${fmt(remainingOfficeCash)}</div></div>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:flex-end;">
                <div>
                    <label style="font-size:11px; color:var(--text-secondary); display:block; margin-bottom:4px;">From Date</label>
                    <input type="date" id="exp_date_from" value="${escapeAttr(STATE.expenseDateFrom)}" onchange="setExpenseDateFilter('expenseDateFrom', this.value)" style="margin-top:0;">
                </div>
                <div>
                    <label style="font-size:11px; color:var(--text-secondary); display:block; margin-bottom:4px;">To Date</label>
                    <input type="date" id="exp_date_to" value="${escapeAttr(STATE.expenseDateTo)}" onchange="setExpenseDateFilter('expenseDateTo', this.value)" style="margin-top:0;">
                </div>
                <button class="btn-sm" onclick="clearExpenseDateFilter()">Clear Dates</button>
                <input id="search_expense" value="${escapeAttr(STATE.expenseSearch)}" oninput="setSearchValue('expenseSearch', this.value)" placeholder="Search expenses" style="max-width:280px; margin-top:0;">
            </div>
            ${expenseFiltered.length === 0
                ? `<div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">${STATE.expenses.length === 0 ? 'No expenses recorded yet.' : 'No expenses match the current filters.'}</div></div>`
                : `<table><thead><tr>
                    <th>Date</th><th>Type</th><th>Vendor</th><th>Reference</th><th>Amount</th><th>Notes</th><th>Action</th>
                </tr></thead>
                <tbody>${expenseFiltered.map(e => `
                <tr>
                    <td style="font-size:12px;">${formatDateTime(e.date)}</td>
                    <td><span class="badge badge-partial">${e.type}</span></td>
                    <td><div class="td-title">${e.vendor || '—'}</div></td>
                    <td style="color:var(--text-secondary);">${e.ref || '—'}</td>
                    <td class="amount-red">${fmt(e.amount)}</td>
                    <td style="color:var(--text-secondary); font-size:12px;">${e.notes || '—'}</td>
                    <td style="white-space:nowrap;">
                        ${isAdminUser() ? `<button class="btn-sm danger" onclick="deleteExpense('${e.id}')">🗑</button>` : ''}
                    </td>
                </tr>`).join('')}
                </tbody></table>`}
        </div>`;
    }

    // ── CASH & BANK ──
    if (STATE.tab==='cash') {
        const cashIn  = STATE.cashTransactions.filter(t=>t.type==='Cash In'||t.type==='Bank Deposit').reduce((s,t)=>s+t.amount,0);
        const cashOut = STATE.cashTransactions.filter(t=>t.type==='Cash Out'||t.type==='Bank Withdrawal').reduce((s,t)=>s+t.amount,0);
        const net     = cashIn - cashOut;
        const deposits= STATE.cashTransactions.filter(t=>t.type==='Bank Deposit').reduce((s,t)=>s+t.amount,0);
        const withdrawals=STATE.cashTransactions.filter(t=>t.type==='Bank Withdrawal').reduce((s,t)=>s+t.amount,0);
        const cashFiltered = sortByNewest(
            STATE.cashTransactions.filter(t => matchesSearch(t, STATE.cashSearch, ['date', 'type', 'account', 'desc', 'cat', 'ref']))
        );

        return `
        <div class="stats-row">
            <div class="stat-card"><div class="stat-label">Total Cash In</div><div class="stat-val green" style="font-size:18px;">${fmt(cashIn)}</div></div>
            <div class="stat-card"><div class="stat-label">Total Cash Out</div><div class="stat-val red" style="font-size:18px;">${fmt(cashOut)}</div></div>
            <div class="stat-card"><div class="stat-label">Net Position</div><div class="stat-val ${net>=0?'green':'red'}" style="font-size:18px;">${fmt(net)}</div></div>
            <div class="stat-card"><div class="stat-label">Bank Deposits</div><div class="stat-val green">${fmt(deposits)}</div></div>
            <div class="stat-card"><div class="stat-label">Bank Withdrawals</div><div class="stat-val red">${fmt(withdrawals)}</div></div>
            <div class="stat-card"><div class="stat-label">Transactions</div><div class="stat-val accent">${STATE.cashTransactions.length}</div></div>
        </div>
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">🏦 Cash &amp; Bank Transactions</div>
                    <div class="card-subtitle">Complete cash and bank ledger</div>
                </div>
                ${isAdminUser() ? `<button class="btn-sm" onclick="openAddCash()">+ Add Transaction</button>` : ''}
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
                <input id="search_cash" value="${escapeAttr(STATE.cashSearch)}" oninput="setSearchValue('cashSearch', this.value)" placeholder="Search cash and bank" style="max-width:280px; margin-top:0;">
            </div>
            ${cashFiltered.length===0
                ? `<div class="empty"><div class="empty-icon">🏦</div><div class="empty-text">${STATE.cashTransactions.length===0 ? 'No transactions recorded yet.' : 'No transactions match the current search.'}</div></div>`
                : `<table><thead><tr>
                    <th>Date</th><th>Type</th><th>Account</th><th>Description</th><th>Category</th><th>Reference</th><th>Amount</th><th></th>
                </tr></thead>
                <tbody>${cashFiltered.map(t => {
                    const isIn = t.type==='Cash In'||t.type==='Bank Deposit';
                    return `<tr>
                        <td style="font-size:12px;">${formatDateTime(t.date)}</td>
                        <td><span class="badge ${isIn?'badge-completed':'badge-high'}">${t.type}</span></td>
                        <td style="color:var(--text-secondary); font-size:12px;">${t.account}</td>
                        <td><div class="td-title" style="font-size:13px;">${t.desc}</div></td>
                        <td style="font-size:12px; color:var(--text-secondary);">${t.cat}</td>
                        <td style="font-size:12px; color:var(--text-muted);">${t.ref||'—'}</td>
                        <td class="${isIn?'amount-green':'amount-red'}">${isIn?'+':'-'}${fmt(t.amount)}</td>
                        <td>${isAdminUser() ? `<button class="btn-sm danger" onclick="deleteCash('${t.id}')">🗑</button>` : ''}</td>
                    </tr>`;
                }).join('')}
                </tbody></table>`}
        </div>`;
    }

    // ── RECEIVABLES REPORT ──
    if (STATE.tab==='report') {
        const ar = STATE.accountsReceivable;
        const reportMatches = ar.filter(r => matchesSearch(r, STATE.reportSearch, ['client', 'inv', 'notes', 'status', 'date', 'due']));
        const paid    = sortPaidReceivables(reportMatches.filter(r=>r.status==='Paid'), STATE.reportPaidSort);
        const partial = sortByNewest(reportMatches.filter(r=>r.status==='Partial'));
        const unpaid  = sortByNewest(reportMatches.filter(r=>r.status==='Unpaid'));
        const overdue = sortByNewest(reportMatches.filter(r=>r.due&&new Date(r.due)<new Date()&&r.status!=='Paid'));

        const totalInvoiced   = ar.reduce((s,r)=>s+r.total,0);
        const totalCollected  = ar.reduce((s,r)=>s+r.received,0);
        const totalOutstanding= totalInvoiced - totalCollected;
        const collectionRate  = totalInvoiced>0?((totalCollected/totalInvoiced)*100).toFixed(1):'0.0';

        // AR by task (linked)
        const allTaskLinkedAR = ar.filter(r=>r.linkedTaskId);
        const taskLinkedAR = sortByNewest(
            ar.filter(r=>r.linkedTaskId && matchesSearch(r, STATE.reportLinkedSearch, ['client', 'inv', 'notes', 'status', 'date']))
        );

        return `
        <div class="card-header" style="margin-bottom:16px;">
            <div>
                <div class="card-title" style="font-size:20px;">📊 Receivables Report</div>
                <div class="card-subtitle">Full summary of client payments and outstanding balances</div>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><div class="stat-label">Total Invoiced</div><div class="stat-val accent" style="font-size:18px;">${fmt(totalInvoiced)}</div></div>
            <div class="stat-card"><div class="stat-label">Collected</div><div class="stat-val green" style="font-size:18px;">${fmt(totalCollected)}</div></div>
            <div class="stat-card"><div class="stat-label">Outstanding</div><div class="stat-val gold" style="font-size:18px;">${fmt(totalOutstanding)}</div></div>
            <div class="stat-card"><div class="stat-label">Collection Rate</div><div class="stat-val ${parseFloat(collectionRate)>=70?'green':'gold'}">${collectionRate}%</div></div>
            <div class="stat-card"><div class="stat-label">Paid</div><div class="stat-val green">${paid.length}</div></div>
            <div class="stat-card"><div class="stat-label">Partial</div><div class="stat-val gold">${partial.length}</div></div>
            <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-val red">${overdue.length}</div></div>
        </div>

        <div class="card" style="margin-bottom:20px;">
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                <input id="search_report" value="${escapeAttr(STATE.reportSearch)}" oninput="setSearchValue('reportSearch', this.value)" placeholder="Search receivables report" style="max-width:280px; margin-top:0;">
                <span style="font-size:12px; color:var(--text-secondary);">Cleared Payments</span>
                <select class="status-select" onchange="STATE.reportPaidSort=this.value;render()">
                    <option value="newest" ${STATE.reportPaidSort==='newest'?'selected':''}>Newest</option>
                    <option value="highest" ${STATE.reportPaidSort==='highest'?'selected':''}>Highest</option>
                </select>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
            <div class="card" style="margin-bottom:0;">
                <div class="card-header" style="margin-bottom:14px;">
                    <div class="card-title" style="color:var(--success);">✅ Cleared Payments (${paid.length})</div>
                    ${reportSectionActions('cleared')}
                </div>
                ${!STATE.reportSectionOpen.cleared ? '<div style="color:var(--text-muted); font-size:13px;">Section closed</div>' :
                paid.length===0 ? '<div style="color:var(--text-muted); font-size:13px;">No fully cleared payments</div>' :
                paid.map(r=>`
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border);">
                        <div>
                            <div style="font-weight:600; font-size:13px;">${r.client}</div>
                            <div style="font-size:11px; color:var(--text-secondary);">${r.inv||''} · ${formatDateTime(r.date)}</div>
                        </div>
                        <div class="amount-green">${fmt(r.total)}</div>
                    </div>`).join('')}
            </div>
            <div class="card" style="margin-bottom:0;">
                <div class="card-header" style="margin-bottom:14px;">
                    <div class="card-title" style="color:var(--warning);">⏳ Partial Payments (${partial.length})</div>
                    ${reportSectionActions('partial')}
                </div>
                ${!STATE.reportSectionOpen.partial ? '<div style="color:var(--text-muted); font-size:13px;">Section closed</div>' :
                partial.length===0 ? '<div style="color:var(--text-muted); font-size:13px;">No partial payments</div>' :
                partial.map(r=>`
                    <div style="padding:8px 0; border-bottom:1px solid var(--border);">
                        <div style="display:flex; justify-content:space-between;">
                            <div style="font-weight:600; font-size:13px;">${r.client}</div>
                            <div class="amount-gold">${fmt(r.received)} / ${fmt(r.total)}</div>
                        </div>
                        <div style="background:var(--navy-800); border-radius:4px; height:4px; margin-top:6px; overflow:hidden;">
                            <div style="background:var(--gold); height:100%; width:${Math.round((r.received/r.total)*100)}%; border-radius:4px;"></div>
                        </div>
                        <div style="font-size:11px; color:var(--text-muted); margin-top:3px;">${Math.round((r.received/r.total)*100)}% collected · Balance: ${fmt(r.total-r.received)}</div>
                    </div>`).join('')}
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
            <div class="card" style="margin-bottom:0;">
                <div class="card-header" style="margin-bottom:14px;">
                    <div class="card-title" style="color:var(--danger);">❌ Unpaid Invoices (${unpaid.length})</div>
                    ${reportSectionActions('unpaid')}
                </div>
                ${!STATE.reportSectionOpen.unpaid ? '<div style="color:var(--text-muted); font-size:13px;">Section closed</div>' :
                unpaid.length===0 ? '<div style="color:var(--text-muted); font-size:13px;">No unpaid invoices 🎉</div>' :
                unpaid.map(r=>`
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border);">
                        <div>
                            <div style="font-weight:600; font-size:13px;">${r.client}</div>
                            <div style="font-size:11px; color:var(--text-secondary);">${r.inv||''} · Due: ${r.due ? formatDateTime(r.due) : '—'}</div>
                        </div>
                        <div class="amount-red">${fmt(r.total)}</div>
                    </div>`).join('')}
            </div>
            <div class="card" style="margin-bottom:0;">
                <div class="card-header" style="margin-bottom:14px;">
                    <div class="card-title" style="color:var(--danger);">⚠️ Overdue (${overdue.length})</div>
                    ${reportSectionActions('overdue')}
                </div>
                ${!STATE.reportSectionOpen.overdue ? '<div style="color:var(--text-muted); font-size:13px;">Section closed</div>' :
                overdue.length===0 ? '<div style="color:var(--text-muted); font-size:13px;">No overdue invoices</div>' :
                overdue.map(r=>{
                    const days = Math.ceil((new Date()-new Date(r.due))/(1000*60*60*24));
                    return `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border);">
                        <div>
                            <div style="font-weight:600; font-size:13px;">${r.client}</div>
                            <div style="font-size:11px; color:var(--danger);">${days} days overdue · Balance: ${fmt(r.total-r.received)}</div>
                        </div>
                        <span class="badge badge-high">${days}d</span>
                    </div>`;
                }).join('')}
            </div>
        </div>

        ${allTaskLinkedAR.length>0 ? `
        <div class="card" style="margin-bottom:0;">
            <div class="card-header" style="margin-bottom:14px;">
                <div class="card-title">🔗 Task-Linked Receivables (${taskLinkedAR.length})</div>
                ${reportSectionActions('linked')}
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
                <input id="search_report_linked" value="${escapeAttr(STATE.reportLinkedSearch)}" oninput="setSearchValue('reportLinkedSearch', this.value)" placeholder="Search task-linked receivables" style="max-width:320px; margin-top:0;">
            </div>
            ${!STATE.reportSectionOpen.linked ? '<div style="color:var(--text-muted); font-size:13px;">Section closed</div>' :
            taskLinkedAR.length===0 ? '<div style="color:var(--text-muted); font-size:13px;">No linked receivables found</div>' :
            `<table><thead><tr><th>Client</th><th>Invoice</th><th>Date</th><th>Total</th><th>Received</th><th>Balance</th><th>Status</th></tr></thead>
            <tbody>${taskLinkedAR.map(r=>`
            <tr>
                <td><div class="td-title">${r.client}</div></td>
                <td style="color:var(--text-secondary);">${r.inv||'—'}</td>
                <td style="font-size:12px;">${formatDateTime(r.date)}</td>
                <td class="amount-gold">${fmt(r.total)}</td>
                <td class="amount-green">${fmt(r.received)}</td>
                <td class="${r.total-r.received>0?'amount-red':'amount-green'}">${fmt(r.total-r.received)}</td>
                <td><span class="badge badge-${r.status.toLowerCase()}">${r.status}</span></td>
            </tr>`).join('')}
            </tbody></table>`}
        </div>` : ''}`;
    }

    // ── MONTHLY RECOVERY ──
    if (STATE.tab==='mr') {
        return renderMR(isAdmin);
    }

    return '';
}


// ═══════════════════════════════════════════════════════════════════════════════
// ── MONTHLY RECOVERY ─────────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════

const MR_CLIENTS_COL  = 'monthlyRecovery';
const MR_PAYMENTS_COL = 'mrPayments';
const AR_MR_COL       = 'accountsReceivable_mr';

async function loadMRData() {
    if (STATE.mrLoading || STATE.mrLoaded) return;
    STATE.mrLoading = true;
    try {
        await ensureFirebaseReady();
        if (!mainDb) {
            // Firebase not available - mark as loaded with empty data so UI renders without looping
            STATE.mrClients  = [];
            STATE.mrPayments = [];
            STATE.mrLoaded   = true;
            STATE.mrLoading  = false;
            showToast('Firebase not connected. Monthly Recovery unavailable.', 'error');
            return;
        }
        await ensureFirebaseAuth();
        const [clientsSnap, paymentsSnap] = await Promise.all([
            _getDocs(_col(mainDb, MR_CLIENTS_COL)),
            _getDocs(_col(mainDb, MR_PAYMENTS_COL))
        ]);
        STATE.mrClients  = [];
        STATE.mrPayments = [];
        clientsSnap.forEach(d => STATE.mrClients.push({ ...d.data(), _fsId: d.id }));
        paymentsSnap.forEach(d => STATE.mrPayments.push({ ...d.data(), _fsId: d.id }));
        STATE.mrLoaded  = true;
    } catch(e) {
        console.error('loadMRData error', e);
        showToast('Failed to load Monthly Recovery data: ' + (e.message || e), 'error');
        // On error also mark loaded to prevent infinite retry loop
        STATE.mrLoaded = true;
    } finally {
        STATE.mrLoading = false;
    }
}

function mrComputeBalance(client) {
    const now = new Date();
    const joinDate = new Date(client.joinedAt || client.createdAt || now);
    const dayOfMonth = parseInt(client.dueDay) || 1;
    const baseDue = parseFloat(client.amountDue) || 0;
    let cyclesDue = 0;
    let d = new Date(joinDate.getFullYear(), joinDate.getMonth(), 1);
    const nowMonth = new Date(now.getFullYear(), now.getMonth(), 1);
    while (d <= nowMonth) {
        const dueDateThisMonth = new Date(d.getFullYear(), d.getMonth(), dayOfMonth);
        if (dueDateThisMonth <= now) cyclesDue++;
        d.setMonth(d.getMonth() + 1);
    }
    const totalDue = baseDue * cyclesDue;
    const clientPayments = STATE.mrPayments.filter(p => p.clientId === client.id);
    const totalPaid = clientPayments.reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
    const remaining = Math.max(0, totalDue - totalPaid);
    let status = 'Unpaid';
    if (remaining <= 0 && totalDue > 0) status = 'Paid';
    else if (totalPaid > 0 && remaining > 0) status = 'Partial';
    return { totalDue, totalPaid, remaining, status, cyclesDue, baseDue };
}

    document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal-box" style="max-width:480px;">
            <button class="modal-close" onclick="closeModal()">x</button>
            <div class="modal-title">+ Add Recovery Client</div>

                <div class="form-full"><label>Client Name *</label><input id="mr_name" placeholder="Full client name"></div>

async function saveMRClient() {
    if (!requireAdmin('add monthly recovery clients')) return;
    await ensureFirebaseReady();
    if (!mainDb) { showToast('Firebase not connected. Cannot save client.', 'error'); return; }
    const name   = document.getElementById('mr_name').value.trim();
    const amount = parseFloat(document.getElementById('mr_amount').value) || 0;
    const day    = parseInt(document.getElementById('mr_day').value) || 1;
    const desc   = document.getElementById('mr_desc').value.trim();
    const start  = document.getElementById('mr_start').value;
    if (!name || !amount) { showToast('Name and amount are required', 'error'); return; }
    const id = String(Date.now());
    const client = { id, name, amountDue: amount, dueDay: day, description: desc, joinedAt: start || new Date().toISOString().slice(0,10), createdAt: nowStamp(), createdBy: STATE.user ? STATE.user.name : '' };
    try {
        await ensureFirebaseAuth();
        await _setDoc(_doc(mainDb, MR_CLIENTS_COL, id), client);
        STATE.mrClients.push({ ...client, _fsId: id });
        // Create AR entry for this client
        const arEntry = { id: 'MR_' + id, client: name, inv: 'MR-' + id, date: start || new Date().toISOString().slice(0,10), due: '', total: amount, received: 0, notes: 'Monthly Recovery - ' + (desc || name), status: 'Unpaid', linkedMRClientId: id };
        STATE.accountsReceivable.push(arEntry);
        glPostARInvoice(arEntry);
        saveAccounting();
        await Promise.all([
            _setDoc(_doc(mainDb, AR_MR_COL, arEntry.id), arEntry),
            rewriteAccountingRowsInDb()
        ]);
        showToast('Client added!');
        closeModal();
        render();
    } catch(e) { console.error(e); showToast('Failed to save client', 'error'); }
}

async function deleteMRClient(clientId) {
    if (!requireAdmin('delete monthly recovery clients')) return;
    const client = STATE.mrClients.find(c => c.id === clientId);
    if (!client) return;
    if (!confirm('Delete client "' + client.name + '"? All payment history will also be deleted.')) return;
    try {
        await ensureFirebaseAuth();
        await _deleteDoc(_doc(mainDb, MR_CLIENTS_COL, clientId));
        const clientPmts = STATE.mrPayments.filter(p => p.clientId === clientId);
        await Promise.all(clientPmts.map(p => _deleteDoc(_doc(mainDb, MR_PAYMENTS_COL, p.id))));
        STATE.mrClients  = STATE.mrClients.filter(c => c.id !== clientId);
        STATE.mrPayments = STATE.mrPayments.filter(p => p.clientId !== clientId);
        STATE.accountsReceivable = STATE.accountsReceivable.filter(r => r.linkedMRClientId !== clientId && r.id !== 'MR_' + clientId);
        // Remove all GL entries related to this MR client
        const mrArId = 'MR_' + clientId;
        const mrInv  = 'MR-' + clientId;
        STATE.generalLedger = STATE.generalLedger.filter(e => {
            const ref = String(e.reference || '');
            return !ref.startsWith(mrInv + '-' + mrArId) && !ref.startsWith('PMT-' + mrArId + '-');
        });
        syncCOABalancesFromGL();
        try { await _deleteDoc(_doc(mainDb, AR_MR_COL, 'MR_' + clientId)); } catch(e2) {}
        saveAccounting();
        await rewriteAccountingRowsInDb();
        showToast('Client deleted!');
        render();
    } catch(e) { console.error(e); showToast('Delete failed', 'error'); }
}

function openMRPayment(clientId) {
    if (!requireAdmin('record payments')) return;
    const client = STATE.mrClients.find(c => c.id === clientId);
    if (!client) return;
    const bal = mrComputeBalance(client);
    document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal-box" style="max-width:440px;">
            <button class="modal-close" onclick="closeModal()">x</button>
            <div class="modal-title">Payment - ${client.name}</div>
            <div style="background:var(--navy-800);border-radius:8px;padding:14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <div><div style="font-size:11px;color:var(--text-muted);">TOTAL DUE</div><div style="font-weight:700;color:var(--gold);">${fmt(bal.totalDue)}</div></div>
                <div><div style="font-size:11px;color:var(--text-muted);">PAID SO FAR</div><div style="font-weight:700;color:var(--success);">${fmt(bal.totalPaid)}</div></div>
                <div><div style="font-size:11px;color:var(--text-muted);">REMAINING</div><div style="font-weight:700;color:var(--danger);">${fmt(bal.remaining)}</div></div>
                <div><div style="font-size:11px;color:var(--text-muted);">STATUS</div><div><span class="badge badge-${bal.status.toLowerCase()}">${bal.status}</span></div></div>
            </div>
            <label>Amount Received (PKR) *</label>
            <input type="number" id="mrp_amount" placeholder="0.00" step="0.01" oninput="mrLiveBalance(${bal.remaining})">
            <div id="mrp_balance_info" style="font-size:12px;color:var(--text-secondary);margin-top:6px;"></div>
            <label>Payment Note</label>
            <input id="mrp_note" placeholder="e.g. Bank transfer, cash...">
            <label>Payment Date</label>
            <input type="date" id="mrp_date">
            <div style="display:flex;gap:10px;margin-top:20px;">
                <button class="btn-primary" style="margin-top:0;" onclick="saveMRPayment('${clientId}')">Save Payment</button>
                <button class="btn-sm success" style="margin-top:0;" onclick="markMRFullyPaid('${clientId}')">Mark Fully Paid</button>
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>`;
    document.getElementById('mrp_date').valueAsDate = new Date();
    mrLiveBalance(bal.remaining);
}

function mrLiveBalance(remaining) {
    const amt = parseFloat(document.getElementById('mrp_amount') ? document.getElementById('mrp_amount').value : 0) || 0;
    const after = remaining - amt;
    const el = document.getElementById('mrp_balance_info');
    if (el) el.innerHTML = 'Remaining after this payment: <strong style="color:' + (after<=0?'var(--success)':'var(--warning)') + ';">' + fmt(Math.max(0, after)) + '</strong>';
}

async function saveMRPayment(clientId) {
    if (!requireAdmin('record payments')) return;
    const client = STATE.mrClients.find(c => c.id === clientId);
    if (!client) return;
    const amount = parseFloat(document.getElementById('mrp_amount').value) || 0;
    const note   = document.getElementById('mrp_note').value.trim();
    const date   = document.getElementById('mrp_date').value || new Date().toISOString().slice(0,10);
    if (amount <= 0) { showToast('Enter a valid payment amount', 'error'); return; }
    const id = String(Date.now());
    const payment = { id, clientId, amount, note, date, createdAt: nowStamp() };
    try {
        await ensureFirebaseReady();
        await ensureFirebaseAuth();
        await _setDoc(_doc(mainDb, MR_PAYMENTS_COL, id), payment);
        STATE.mrPayments.push({ ...payment, _fsId: id });
        // GL entry: Dr Cash / Cr Accounts Receivable
        glPostARPayment({ id: 'MR_' + clientId, client: client.name, inv: 'MR-' + clientId, received: amount, total: client.amountDue }, 0);
        // Update AR entry regardless of whether it exists
        const allPaid = STATE.mrPayments.filter(p => p.clientId === clientId).reduce((s,p) => s + (parseFloat(p.amount)||0), 0);
        const newBal = mrComputeBalance(client);
        const arEntry = STATE.accountsReceivable.find(r => r.linkedMRClientId === clientId);
        if (arEntry) {
            arEntry.received = allPaid;
            arEntry.total    = newBal.totalDue;
            arEntry.status   = allPaid >= newBal.totalDue ? 'Paid' : allPaid > 0 ? 'Partial' : 'Unpaid';
            try { await _setDoc(_doc(mainDb, AR_MR_COL, arEntry.id), arEntry); } catch(e2) {}
        } else {
            // AR entry missing — recreate it so GL and COA stay consistent
            const newAr = { id: 'MR_' + clientId, client: client.name, inv: 'MR-' + clientId, date: client.joinedAt || new Date().toISOString().slice(0,10), due: '', total: newBal.totalDue, received: allPaid, notes: 'Monthly Recovery - ' + client.name, status: allPaid >= newBal.totalDue ? 'Paid' : allPaid > 0 ? 'Partial' : 'Unpaid', linkedMRClientId: clientId };
            STATE.accountsReceivable.push(newAr);
            try { await _setDoc(_doc(mainDb, AR_MR_COL, newAr.id), newAr); } catch(e2) {}
        }
        // Always persist the full accounting set to localStorage and Firebase so
        // GL, Chart of Accounts and Trial Balance stay consistent.
        saveAccounting();
        await rewriteAccountingRowsInDb();
        showToast('Payment recorded!');
        closeModal();
        render();
    } catch(e) { console.error(e); showToast('Failed to save payment', 'error'); }
}

async function markMRFullyPaid(clientId) {
    if (!requireAdmin('record payments')) return;
    const client = STATE.mrClients.find(c => c.id === clientId);
    if (!client) return;
    const bal = mrComputeBalance(client);
    if (bal.remaining <= 0) { showToast('Already fully paid!', 'info'); closeModal(); return; }
    const id = String(Date.now());
    const payment = { id, clientId, amount: bal.remaining, note: 'Full payment', date: new Date().toISOString().slice(0,10), createdAt: nowStamp() };
    try {
        await ensureFirebaseReady();
        await ensureFirebaseAuth();
        await _setDoc(_doc(mainDb, MR_PAYMENTS_COL, id), payment);
        STATE.mrPayments.push({ ...payment, _fsId: id });
        glPostARPayment({ id: 'MR_' + clientId, client: client.name, inv: 'MR-' + clientId, received: bal.remaining, total: client.amountDue }, 0);
        const allPaidFull = STATE.mrPayments.filter(p => p.clientId === clientId).reduce((s,p) => s + (parseFloat(p.amount)||0), 0);
        const arEntryFull = STATE.accountsReceivable.find(r => r.linkedMRClientId === clientId);
        if (arEntryFull) {
            arEntryFull.received = allPaidFull;
            arEntryFull.total    = bal.totalDue;
            arEntryFull.status   = 'Paid';
            try { await _setDoc(_doc(mainDb, AR_MR_COL, arEntryFull.id), arEntryFull); } catch(e2) {}
        } else {
            // AR entry missing — recreate it
            const newAr = { id: 'MR_' + clientId, client: client.name, inv: 'MR-' + clientId, date: client.joinedAt || new Date().toISOString().slice(0,10), due: '', total: bal.totalDue, received: allPaidFull, notes: 'Monthly Recovery - ' + client.name, status: 'Paid', linkedMRClientId: clientId };
            STATE.accountsReceivable.push(newAr);
            try { await _setDoc(_doc(mainDb, AR_MR_COL, newAr.id), newAr); } catch(e2) {}
        }
        // Always persist the full accounting set to localStorage and Firebase so
        // GL, Chart of Accounts and Trial Balance stay consistent.
        saveAccounting();
        await rewriteAccountingRowsInDb();
        showToast('Marked as fully paid!');
        closeModal();
        render();
    } catch(e) { console.error(e); showToast('Failed', 'error'); }
}

function openMRPaymentHistory(clientId) {
    const client = STATE.mrClients.find(c => c.id === clientId);
    if (!client) return;
    const bal = mrComputeBalance(client);
    const asc = [...STATE.mrPayments.filter(p => p.clientId === clientId)].sort((a,b) => getTimeValue(a.date) - getTimeValue(b.date));
    let runBal = bal.totalDue;
    const rows = asc.map(p => {
        runBal -= (parseFloat(p.amount) || 0);
        const afterBal = Math.max(0, runBal);
        return '<tr><td style="font-size:12px;">' + formatDateTime(p.date) + '</td><td class="amount-green">' + fmt(p.amount) + '</td><td class="' + (afterBal>0?'amount-red':'amount-green') + '">' + fmt(afterBal) + '</td><td style="color:var(--text-secondary);font-size:12px;">' + (p.note || '-') + '</td></tr>';
    }).join('');
    document.getElementById('modal-container').innerHTML =
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">' +
    '<div class="modal-box" style="max-width:600px;">' +
    '<button class="modal-close" onclick="closeModal()">x</button>' +
    '<div class="modal-title">Payment History - ' + client.name + '</div>' +
    '<div style="background:var(--navy-800);border-radius:8px;padding:12px;margin-bottom:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">' +
    '<div><div style="font-size:11px;color:var(--text-muted);">TOTAL DUE</div><div style="font-weight:700;color:var(--gold);">' + fmt(bal.totalDue) + '</div></div>' +
    '<div><div style="font-size:11px;color:var(--text-muted);">TOTAL PAID</div><div style="font-weight:700;color:var(--success);">' + fmt(bal.totalPaid) + '</div></div>' +
    '<div><div style="font-size:11px;color:var(--text-muted);">BALANCE</div><div style="font-weight:700;color:var(--danger);">' + fmt(bal.remaining) + '</div></div>' +
    '</div>' +
    (asc.length === 0 ? '<div class="empty"><div class="empty-icon">💸</div><div class="empty-text">No payments recorded yet.</div></div>' :
    '<div style="overflow-x:auto;"><table><thead><tr><th>Date</th><th>Amount</th><th>Remaining After</th><th>Note</th></tr></thead><tbody>' + rows + '</tbody></table></div>') +
    '<div style="margin-top:16px;"><button class="btn-outline" onclick="closeModal()">Close</button></div>' +
    '</div></div>';
}

function renderMR(isAdmin) {
    if (!STATE.mrLoaded) {
        // Trigger load only if not already loading; the .then(render) callback will re-render once data arrives
        if (!STATE.mrLoading) {
            loadMRData().then(() => render());
        }
        return '<div class="card"><div style="text-align:center;padding:40px;color:var(--text-muted);">Loading Monthly Recovery data...</div></div>';
    }
    const mrDateFrom = STATE.mrDateFrom;
    const mrDateTo   = STATE.mrDateTo;
    const search     = (STATE.mrSearch || '').toLowerCase().trim();
    let clients = STATE.mrClients;
    if (search) clients = clients.filter(c => (c.name||'').toLowerCase().includes(search) || (c.description||'').toLowerCase().includes(search));
    const allBalances = clients.map(c => ({ client: c, bal: mrComputeBalance(c) }));
    const totalDue       = allBalances.reduce((s, x) => s + x.bal.totalDue, 0);
    const totalPaid      = allBalances.reduce((s, x) => s + x.bal.totalPaid, 0);
    const totalRemaining = allBalances.reduce((s, x) => s + x.bal.remaining, 0);
    const paidCount      = allBalances.filter(x => x.bal.status === 'Paid').length;
    const partialCount   = allBalances.filter(x => x.bal.status === 'Partial').length;
    const unpaidCount    = allBalances.filter(x => x.bal.status === 'Unpaid').length;
    let filteredPayments = STATE.mrPayments;
    if (mrDateFrom) filteredPayments = filteredPayments.filter(p => (p.date||'') >= mrDateFrom);
    if (mrDateTo)   filteredPayments = filteredPayments.filter(p => (p.date||'') <= mrDateTo);

    const tableRows = allBalances.map(function(x) {
        const c = x.client; const bal = x.bal;
        return '<tr>' +
            '<td><div class="td-title">' + c.name + '</div>' +
            (c.description ? '<div class="td-sub" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + c.description + '</div>' : '') +
            '<div class="td-sub">Since ' + formatDateTime(c.joinedAt || c.createdAt) + '</div></td>' +
            '<td class="amount-gold">' + fmt(c.amountDue) + '</td>' +
            '<td style="color:var(--text-secondary);font-weight:600;">' + bal.cyclesDue + '</td>' +
            '<td class="amount-gold">' + fmt(bal.totalDue) + '</td>' +
            '<td class="amount-green">' + fmt(bal.totalPaid) + '</td>' +
            '<td class="' + (bal.remaining>0?'amount-red':'amount-green') + '">' + fmt(bal.remaining) + '</td>' +
            '<td><span class="badge badge-' + bal.status.toLowerCase() + '">' + bal.status + '</span></td>' +
            '<td style="color:var(--text-secondary);">Day ' + (c.dueDay||1) + '</td>' +
            (isAdmin ? '<td><div class="btn-action-group">' +
                '<button class="btn-sm success" onclick="openMRPayment(\'' + c.id + '\')">Pay</button>' +
                '<button class="btn-sm purple" onclick="openMRPaymentHistory(\'' + c.id + '\')">History</button>' +
                '<button class="btn-sm danger" onclick="deleteMRClient(\'' + c.id + '\')">Del</button>' +
                '</div></td>' : '') +
        '</tr>';
    }).join('');

    const reportSection = (mrDateFrom || mrDateTo) ? (function() {
        if (filteredPayments.length === 0) return '<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">No payments in this date range.</div></div>';
        const reportTotal = filteredPayments.reduce((s,p) => s + (parseFloat(p.amount)||0), 0);
        const reportRows = sortByNewest(filteredPayments,'date').map(function(p) {
            const c = STATE.mrClients.find(cl => cl.id === p.clientId);
            return '<tr><td style="font-size:12px;">' + formatDateTime(p.date) + '</td><td class="td-title">' + (c ? c.name : '-') + '</td><td class="amount-green">' + fmt(p.amount) + '</td><td style="color:var(--text-secondary);font-size:12px;">' + (p.note||'-') + '</td></tr>';
        }).join('');
        return '<table><thead><tr><th>Date</th><th>Client</th><th>Amount</th><th>Note</th></tr></thead><tbody>' + reportRows + '</tbody></table>';
    })() : null;

    return '<div class="anim-fade-up">' +
        '<div class="card-header" style="margin-bottom:20px;">' +
            '<div><div class="card-title" style="font-size:20px;">Monthly Recovery</div>' +
            '<div class="card-subtitle">Track recurring client payments — auto-accumulates unpaid balances month-to-month</div></div>' +
            (isAdmin ? '<button class="btn-sm success" onclick="openAddMRClient()">+ Add Client</button>' : '') +
        '</div>' +
        '<div class="stats-row stagger" style="margin-bottom:22px;">' +
            '<div class="stat-card"><div class="stat-label">Total Clients</div><div class="stat-val accent">' + clients.length + '</div></div>' +
            '<div class="stat-card"><div class="stat-label">Total Due</div><div class="stat-val gold" style="font-size:18px;">' + fmt(totalDue) + '</div></div>' +
            '<div class="stat-card"><div class="stat-label">Total Collected</div><div class="stat-val green" style="font-size:18px;">' + fmt(totalPaid) + '</div></div>' +
            '<div class="stat-card"><div class="stat-label">Outstanding</div><div class="stat-val red" style="font-size:18px;">' + fmt(totalRemaining) + '</div></div>' +
            '<div class="stat-card"><div class="stat-label">Fully Paid</div><div class="stat-val green">' + paidCount + '</div></div>' +
            '<div class="stat-card"><div class="stat-label">Partial</div><div class="stat-val gold">' + partialCount + '</div></div>' +
            '<div class="stat-card"><div class="stat-label">Unpaid</div><div class="stat-val red">' + unpaidCount + '</div></div>' +
        '</div>' +
        '<div class="card" style="margin-bottom:20px;padding:14px 18px;">' +
            '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">' +
                '<input placeholder="Search clients..." value="' + escapeAttr(STATE.mrSearch) + '" oninput="setSearchValue(\'mrSearch\',this.value)" style="max-width:260px;margin-top:0;">' +
                '<div style="display:flex;align-items:center;gap:8px;"><label style="font-size:11px;color:var(--text-secondary);margin:0;text-transform:none;">From</label>' +
                '<input type="date" value="' + escapeAttr(mrDateFrom) + '" onchange="STATE.mrDateFrom=this.value;render()" style="margin-top:0;width:auto;"></div>' +
                '<div style="display:flex;align-items:center;gap:8px;"><label style="font-size:11px;color:var(--text-secondary);margin:0;text-transform:none;">To</label>' +
                '<input type="date" value="' + escapeAttr(mrDateTo) + '" onchange="STATE.mrDateTo=this.value;render()" style="margin-top:0;width:auto;"></div>' +
                '<button class="btn-sm" onclick="STATE.mrDateFrom=\'\';STATE.mrDateTo=\'\';render()">Clear</button>' +
            '</div>' +
        '</div>' +
        '<div class="card">' +
            '<div class="card-header" style="margin-bottom:16px;"><div class="card-title">Clients (' + allBalances.length + ')</div></div>' +
            (allBalances.length === 0
                ? '<div class="empty"><div class="empty-icon">🔄</div><div class="empty-text">No clients yet.' + (isAdmin ? ' Add a client above.' : '') + '</div></div>'
                : '<div style="overflow-x:auto;"><table><thead><tr><th>Client</th><th>Monthly Due</th><th>Cycles Due</th><th>Total Due</th><th>Paid</th><th>Remaining</th><th>Status</th><th>Due Day</th>' + (isAdmin ? '<th>Actions</th>' : '') + '</tr></thead><tbody>' + tableRows + '</tbody></table></div>') +
        '</div>' +
        (reportSection ? '<div class="card" style="margin-top:20px;">' +
            '<div class="card-header" style="margin-bottom:16px;">' +
                '<div><div class="card-title">Payment Report</div>' +
                '<div class="card-subtitle">' + (mrDateFrom||'All time') + ' to ' + (mrDateTo||'Today') + ' &middot; ' + filteredPayments.length + ' payments &middot; Total: <span class="amount-green">' + fmt(filteredPayments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0)) + '</span></div></div>' +
            '</div>' + reportSection + '</div>' : '') +
        '</div>';
}

render();
syncData();
</script>
